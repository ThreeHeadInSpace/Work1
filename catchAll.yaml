general:
  mainReply:
    - Прошу прощения, не получилось вас понять.
    - Не совсем понял вас.
    - Простите, не совсем понял ваш ответ.
    - Извините, не уверен, что правильно понял, что вы имели в виду.
  defaultFirst:
    - Попробуйте, пожалуйста, переформулировать вопрос.
    - Пожалуйста, попробуйте задать вопрос по-другому.
  defaultFinal:
    - Кажется, это пока не в моей компетенции. Для продолжения консультации переключаю вас на оператора.

