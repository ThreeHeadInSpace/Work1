# Заказ наличных
CashOrder:
  FirstReply:
    - Готов рассказать вам в подробностях о заказе наличных в банке Уралсиб.
    - С радостью расскажу детали о заказе наличных в отделении банка.
  SecondReply:
    - Уточните, какая операция вам требуется?
    - Выберите необходимую операцию.
  Buttons:
    - text: Ознакомиться с условиями
      transition: "/CashOrder/CashOrder/Conditions"
    - text: Оформить заявку
      transition: "/CashOrder/CashOrder/Request"
    - text: Отменить заявку
      transition: "/CashOrder/CashOrder/RequestCancel"

RequestCancel:
  NotAuthorized:
    - Чтобы отменить заявку на заказ денежных средств, позвоните на номер 8-800-250-57-57 или напишите в чат «Уралсиб Онлайн».
  NoActiveOrders:
    - Для продолжения консультации переключаю вас на оператора.
  ManyActiveOrders:
    - Нашел несколько активных заказов денежных средств. Какой из них требуется отменить?

RequestCancelError:
  - Для отмены заявки на заказ денежных средств переключаю вас на оператора.

RequestCancelConfirmation:
  Reply:
    - Вы подтверждаете отмену заявки на заказ наличных №{{$session.cashOrder.id}} от {{$session.cashOrder.issueDate}} на сумму {{$temp.conformedRubles}}?
  Buttons:
    - text: Да
      transition: "/CashOrder/CashOrder/RequestCancel/Confirmation/Agree"
    - text: Нет
      transition: "/CashOrder/CashOrder/RequestCancel/Confirmation/Disagree"


RequestCancelConfirmationAgree:
  - Заявка на заказ денежных средств №{{$session.cashOrder.id}} успешно отменена.

RequestCancelConfirmationAgreeError:
  - Для отмены заявки на заказ денежных средств переключаю вас на оператора.

RequestCancelConfirmationDisagree:
  - Понял вас. Заявка на заказ денежных средств №{{$session.cashOrder.id}} не отменена.

RequestCancelConfirmationAgreeInactiveAPI:
  - Отмену заявки оформит специалист – подключаю оператора.
  - Миссия «отмена заявки» принята. Зову специалиста!

Currency:
  Reply:
    - Подскажите, вас интересует заказ денежных средств в рублях?
  Buttons:
    - text: Да
      transition: "/CashOrder/CashOrder/Currency/Rub"
    - text: Нет, в валюте
      transition: "/CashOrder/CashOrder/Currency/Another"

Rub:
  Conditions:
    - |
      Чтобы получить сумму до 300 000 рублей, предварительный заказ не нужен.
      Обратитесь с паспортом в любой офис банка.

      Сумму более 300 000 рублей нужно заказывать заранее.
    - |
      При снятии наличных в кассе банка, поступивших безналичным путем и находящихся на счёте меньше 30 дней, комиссия составляет:
      • При снятии до 3 млн. рублей включительно — ({{$tariffs.DebitCardProfit.Less3MillionPercent}})
      • Свыше 3-х млн. рублей — ({{$tariffs.DebitCardProfit.More3MillionPercent}})
  Else:
    - Какую сумму вы планируете заказать?

  Agree:
    - Чтобы получить сумму до 300 000 рублей, предварительный заказ не нужен. Обратитесь с паспортом в любой офис банка.
    - 'Адреса и режим работы офисов банка вы найдете по [ссылке]({{$temp.OfficeLink}})'

  Disagree:
    NotAuthorized:
      - |
        Для данной суммы потребуется оформить предварительный заказ наличных. Сделать это можно:
        • В чате «Уралсиб Онлайн»
        • По номеру горячей линии — 8-800-250-57-57
    Authorized:
      - Для выдачи такой суммы нужно оформить предварительный заказ. Сейчас переведу вас на оператора для оформления.
      - Крупная сумма – крупный подход. Подключаю оператора для оформления заявки.

Another:
  Conditions:
    - |
      В настоящий момент выдача денежных средств в иностранной валюте возможна только в долларах $ (USD) и евро € (EUR). Также важно соблюсти следующие условия:
      • Денежные средства должны находиться на вашем счету
      • Денежные средства поступили на счет до 09.03.2022 (00:00 часов по московскому времени)
      • Получить можно не более 10 000 $ или эквивалент указанной суммы в €
  Else:
    - Сумма поступила на счет до 09.03.2022?
  Buttons:
    - text: Да
      transition: "/CashOrder/CashOrder/Currency/Another/Agree"
    - text: Нет, позже
      transition: "/CashOrder/CashOrder/Currency/Another/Disagree"

  Agree:
    NotAuthorized:
      - |
        Вам потребуется оформить предварительный заказ наличных. Сделать это можно:
        • В чате «Уралсиб Онлайн»
        • По номеру горячей линии — 8-800-250-57-57
    Authorized:
      - Чтобы оформить выдачу наличных, потребуется заказ заранее. Сейчас передам вас оператору.

  Disagree:
    - В настоящий момент выдача денежных средств в иностранной валюте — долларах $ (USD) и евро € (EUR) — возможна только со счета и при условии, что денежные средства поступили на счет до 09.03.2022 (00:00 часов по московскому времени). При этом получить можно не более 10 000 $ или эквивалент указанной суммы в €.
    - Также вы можете приобрести иностранную валюту в кассе за наличные. Средства можно получить в рублях по внутреннему курсу банка.
    
Status:
  NotAuthorized: Для уточнения статуса заявки заказа наличных напишите в чат приложения [«Уралсиб Онлайн»](https://uralsib.ru/online) или его [веб-версии](https://online.uralsib.ru/)
  Authorized: Переключаю вас на оператора — он уточнит детали вашей заявки на выдачу наличных.

toOperator: Для продолжения консультации переключаю вас на оператора.
