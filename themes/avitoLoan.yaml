# Кредит Авито
AvitoLoan:
  reply: Уралсиб выдает целевой кредит на покупку автомобиля у другого физического лица через сервис «Авито». Уточните, что именно вас интересует?
  buttons:
    - text: "Оформление"
      transition: "/AvitoLoan/AvitoLoan/Request"
    - text: "Условия кредита"
      transition: "/AvitoLoan/AvitoLoan/Conditions"
    - text: "Статус заявки"
      transition: "/CheckLoan/CheckLoan"
    - text: "Вопрос по действующему кредиту"
      transition: "/LoansConsultation/Loan"
      
Request: 
    - |
      Для оформления кредита на покупку автомобиля у физического лица:
      1. Найдите авто на «Авито», нажмите «Взять в кредит» — запрос направляется в несколько банков
      2. Рассмотрение заявки займет от 5 минут
      3. Одобренные предложения вы увидите на платформе. При одобрении от Уралсиба у вас будет 5 календарных дней для ознакомления с условиями и подписания документов
    - |
      4. После подписания документов и оформления кредита с вами свяжется представитель «Авито» и назначит встречу, на которой должны присутствовать: вы, продавец, автомобиль, представитель «Авито».  
      5. На проведение встречи выделяется 10 календарных дней. Если в течение этого периода встреча не состоится, банк отменит сделку и досрочно погасит выданный кредит.
    - Для более подробной консультации обратитесь на горячую линию 8-800-600-00-01 или в чат поддержки «Авито»/«Авито Финанс».
    
Conditions:
    - |
      Процентная ставка: от 23,9%
      • Срок кредита: от 13 до 120 месяцев
      • Сумма кредита: от 100 000 до 13 000 000 рублей
    - В случае одобрения банком суммы меньше стоимости автомобиля, можно внести недостающую сумму из собственных средств, либо рассмотреть другой авто для покупки.