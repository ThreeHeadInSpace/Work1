# Своя ставка

YourRate:
    reply: Какой у вас вопрос по услуге «Своя ставка»?
    buttons:
        - text: "Общая информация"
          transition: "/YourRate/YourRate/Info"
        - text: "Оформить"
          transition: "/YourRate/YourRate/Request"
        - text: "Отказаться"
          transition: "/YourRate/YourRate/Refund"
          
Info: 
    - |
      Услуга «Своя ставка» позволяет снизить процентную ставку по кредиту.
    - |
      Стоимость услуги зависит от параметров кредита. Оплачивается при его оформлении.
      Подробная информация размещена на сайте по [ссылке](https://uralsib.ru/faq/personal/kredity/kredit-na-lyubye-tseli/usluga-svoya-stavka)
    
Request: Услугу «Своя ставка» можно оформить только в момент заключения договора потребительского кредита или автокредитования.

Refund:
    reply: Понял, что вы хотите отказаться от услуги «Своя ставка». Уточните, какой кредит оформляли?
    buttons:
        - text: "Потребительский кредит"
          transition: "/YourRate/YourRate/Refund/ConsumerLoan"
        - text: "Автокредит"
          transition: "/YourRate/YourRate/Refund/CarLoan"
        - text: "Узнать статус заявления на отказ"
          transition: "/YourRate/YourRate/Refund/Status"
          
ConsumerLoan: 
    - |
        Отказ от «Своей ставки» — возможен в течение 30 дней после подписания договора.
        При отказе ставка увеличится: информация  — в п. 4 индивидуальных условий кредитного договора.
    - |
        Заявление на возврат средств рассматривается 7 рабочих дней.
        Плата за «Свою ставку» будет возвращена в виде частичного погашения кредита с уменьшением ежемесячного платежа.
    - |
        Для отказа от услуги обратитесь по номеру +7 (495) 723-77-28 в будни с 09:00 до 17:00 по МСК.
        
CarLoan:
    - |
        Отказ от «Своей ставки» — возможен в течение 30 дней после подписания договора. 
        При отказе ставка увеличится: информация  — в п. 4 индивидуальных условий кредитного договора.
    - |
        Заявление на возврат средств рассматривается 7 рабочих дней.
    - |
        Для отказа обратитесь в офис или направьте заполненное заявление на электронную почту банка: stavka@uralsib.ru.
        Чтобы запросить форму заявления, напишите «Оператор», и я соединю вас со специалистом.
        
Status: |
    Заявление на возврат средств рассматривается 7 рабочих дней.
    Если срок вышел, напишите «Оператор» — я соединю вас со специалистом.