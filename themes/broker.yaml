#Вопрос по брокерскому счету и инвестициям
Broker:
    reply:
        - Вы хотите открыть брокерский счет, или у вас вопрос по действующему счету?
    buttons: 
        - text: Открыть
          transition: "/Broker/Broker/Request"
        - text: Вопрос по действующему счету и ценным бумагам
          transition: "/Broker/Broker/Current"
        - text: Что за счет «Твой брокер»?
          transition: "/Broker/Broker/Whats"

Request: 
    NotAuthorizedOrWeb:
        - |
          Открытие брокерского счета или индивидуального инвестиционного счета (ИИС) доступно гражданам и налоговым резидентам РФ старше 18 лет. 
          Открыть счет можно в мобильном приложении [«Уралсиб Онлайн»](https://uralsib.ru/online) в разделе «Инвестиции».
        
    iOsOrAndroid:
        - |
          Открытие брокерского счета или индивидуального инвестиционного счета (ИИС) доступно гражданам и налоговым резидентам РФ старше 18 лет.
          Чтобы открыть счет:
          1. На главном экране найдите раздел «Инвестиции»
          2. Нажмите кнопку «Открыть счет»
          
    final:
        - |
          Для более подробной консультации позвоните в ООО «Твой Брокер» по номеру 8-800-100-59-00 в будние дни с 09:00 до 19:00 по МСК.


Current:
    reply:
        - Для консультации по действующему счету позвоните в ООО «Твой Брокер» по номеру 8-800-100-59-00 в будние дни с 09:00 до 19:00 по МСК.
        
Whats:
    reply:
        - |
         Видите в личном кабинете брокерский счет, который не открывали? Это персональное предложение для вас. 
         Узнать условия и открыть счет можно нажав на баннер.
         
Cancel:
    reply:
        - Для консультации по вопросам закрытия заявки на открытие брокерского счета позвоните в ООО «Твой Брокер» по номеру 8-800-100-59-00 в будние дни с 09:00 до 19:00 по МСК.
