        PackageTerms:
            AndroidOrIos: |
                Чтобы получить информацию о тарифах на пакеты услуг:
                1. В разделе «Главная» выберите карту.
                2. Далее в разделе «О карте» нажмите на кнопку «Условия обслуживания».
            Web: |
                Чтобы получить информацию о тарифах на пакеты услуг:
                1. На главной странице выберите карту.
                2. Далее в разделе «Информация» перейдите на вкладку «Условия обслуживания».
        PackageFreeTerms:
            AndroidOrIos: |
                Чтобы получить информацию об обороте по карте для выполнения условия бесплатности пакета услуг:
                1. В разделе «Главная» выберите карту. 
                2. Далее перейдите во вкладку «О карте».
            Web: Чтобы получить информацию об обороте по карте для выполнения условия бесплатности пакета услуг, на главной странице выберите нужную карту. 
    SomePackages: Выберите пакет услуг, по которому вам требуется информация.
    
GetPackageFreeTerms:
    - |
        {{ $session.name }}, для выполнения условия бесплатности по вашему пакету {{ $session.chosenPackage.name }} с основной картой {{ $session.chosenPackage.free.pan }} вами была потрачена сумма в размере {{ $temp.rubleForm1 }}.
    - Для выполнения условия необходимо было потратить {{ $temp.rubleForm2 }}. Условие бесплатности {{$session.chosenPackage.free.status}}.

