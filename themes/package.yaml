Package:
  FirstReply:
    - Готов проконсультировать вас по вопросам, связанным с пакетами услуг банка Уралсиб.
    - С удовольствием расскажу вам о пакетах услуг.
  SecondReply:
    - Уточните, какая операция вам требуется?
    - Выберите интересующую вас операцию.
  Buttons:
    - text: Оформить пакет услуг
      transition: /Premium/Premium
    - text: Тарифы и условия
      transition: /Package/Package/Terms
    - text: Оборот для условий бесплатности
      transition: /Package/Package/FreeTerms
    - text: Закрыть пакет услуг
      transition: /Package/Package/Close
      
Terms: |
    Получить информацию о тарифах на пакеты услуг можно:
    • В приложении «Уралсиб Онлайн» в разделе Главная -> Карты -> О карте -> Условия обслуживания. Или в [веб-версии на сайте](https://online.uralsib.ru): на главной странице выберите карту -> Информация -> Условия обслуживания
    • В чате «Уралсиб Онлайн»
    • По номеру горячей линии 8-800-250-57-57
    • На нашем сайте в разделе «Премиум» по [ссылке](https://www.uralsib.ru/premium)

TermsAnswer: Получить информацию по условиям и тарифам вашего пакета услуг можно по [ссылке]({{ $temp.PackageTermsLink }})

FreeTerms: |
    Информацию об обороте по карте для выполнения условия бесплатности пакета услуг вы можете получить:
    • В приложении «Уралсиб Онлайн» в разделе Главная -> Карты -> О карте
    • В [веб-версии на сайте](https://online.uralsib.ru), после выбора карты на главной странице
    • В чате «Уралсиб Онлайн»
    • По номеру горячей линии 8-800-250-57-57
    
Close: По вопросам закрытия пакета услуг переключаю вас на оператора.

GetPackagesError: Для получения информации по пакету услуг переключаю вас на оператора.

