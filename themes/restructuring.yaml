#Вопрос про кредитные каникулы или реструктуризацию

Restructuring:
    reply:
        - Какой у вас вопрос по кредитным каникулам или реструктуризации?
    buttons: 
        - text: Подать заявку
          transition: "/Restructuring/Restructuring/Request"
        - text: Узнать статус заявки
          transition: "/Restructuring/Restructuring/Status"

Request:
    reply:
        - По какому продукту вы хотите оформить кредитные каникулы или реструктуризацию?
    buttons: 
        - text: Кредит
          transition: "/Restructuring/Restructuring/Request/Loan"
        - text: Микрозайм
          transition: "/Restructuring/Restructuring/Request/Microloan"

Loan: 
    reply: 
        - Для консультации по оформлению кредитных каникул или реструктуризации позвоните по номеру 8-800-700-78-46 в будние дни с 7:00 до 16:00 по МСК.

Microloan:
    reply: 
        - Реструктуризация договора займа не предусмотрена.
        
        - |
          При трудной жизненной ситуации можно подать заявку на кредитные каникулы. Заполните заявление на [сайте](https://uralsibfinance.ru/borrowers) в разделе «Документы» - «Информация для получателя финансовой услуги».
          Скан заявления и подтверждающие документы можно отправить:
          • На электронную почту: restructurization@uralsibfinance.ru
          • В личном кабинете по [ссылке](https://lk.uralsibfinance.ru) 
          • На почтовый адрес: 119048, г. Москва, улица Ефремова, дом 8, этаж 9, комната 1
          
Status: 
    reply: 
        - Рассмотрение заявления на реструктуризацию и кредитные каникулы занимает до 5 рабочих дней. Решение будет направлено в SMS сообщении или по телефону.
        
        - Если кредитные каникулы будут одобрены, в течение 7 рабочих дней информация появится в личном кабинете.