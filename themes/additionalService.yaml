# Дополнительные услуги
TimeAsAGift:
  - Услуга «Время в подарок» является архивной. Условия начисления кешбэка по телефонной карте не меняются.

Secure3D:
  Reply: 
    - Воспользоваться сервисом по переводам с карты на карту в сети интернет возможно только для карт поддерживающих технологию 3D Secure.
    
  InactiveAPI: Проверить подключение карты к услуге «3D Secure» можно по номеру горячей линии — 8-800-250-57-57.

  ManyCards:
    - По какой карте хотите проверить наличие услуги «3D Secure»?

  NotAuthorized:
    - |
      Проверить подключение карты к услуге «3D Secure» можно:
      • В чате «Уралсиб Онлайн»
      • По номеру горячей линии — 8-800-250-57-57

  Authorized:
    - Для проверки подключения услуги «3D Secure» переключаю вас на оператора.

  Status: 
    Active: "К вашей карте *{{$session.usersTargetCard.pan}} подключена услуга «3D Secure» на номер {{$session.targetCardPhoneNumber}}."
    Inactive: "Услуга «3D Secure» не подключена к вашей карте *{{$session.usersTargetCard.pan}}."
    NoSMS: "Подключить услугу «3D Secure» можно, включив СМС-уведомления. Хотите это сделать?"

  Buttons: 
    - text: "Да"
      transition: "/SMSNotifications/SMSOn/Check/Number"
    - text: "Нет"
      transition: "/SomethingElse"

