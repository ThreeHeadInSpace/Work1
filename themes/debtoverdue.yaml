# Просрочка
DebtOverDue:
    reply: |
       Я понял, что ваш вопрос связан с просроченной задолженностью. 
       Уточните, что именно вас интересует? Вот самые частые запросы:
    buttons:
        - text: "Наличие просроченной задолженности"
          transition: "/DebtOverDue/DebtOverDue/Have"
        - text: "Урегулировать просроченную задолженность"
          transition: "/DebtOverDue/DebtOverDue/Collection"
        - text: "Погашение просроченной задолженности"
          transition: "/MobileAppNavigation/DBONavigation/Loans/TopUp"
          
Have: 
    reply: |
       Просроченная задолженность отображается на главном экране. 
       Для просмотра деталей:
       1. Выберите нужный продукт
       2. На вкладке «Задолженность на сегодня» нажмите на знак вопроса.

