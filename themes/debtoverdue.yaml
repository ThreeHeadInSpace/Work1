Collection: Тут нужна помощь оператора. Перевожу на сотрудника по работе с просроченной задолженностью.

CollectionNotWork: 
    - |
      Тут нужна помощь оператора. Отдел по работе с просроченной задолженностью в чате работает с ПН по ПТ с 07:00 до 16:00 МСК. Напишите нам повторно в это время.
    - |
      Также можно обратиться по телефону 8-800-700-00-79 с ПН по ПТ с 06:00 до 19:00 и в СБ-ВС с 07:00 до 16:00 МСК.
      
CollectionHappyNewYear: 
    - |
     Тут нужна помощь оператора. Сегодня у специалистов отдела по работе с задолженностью выходной день.
     В остальные дни режим работы отдела в чате: с ПН по ПТ с 07:00 до 16:00 МСК. Напишите нам повторно в это время.
    - |
     Также можно обратиться в рабочие будни по телефону 8-800-700-00-79 с ПН по ПТ с 06:00 до 19:00 и в СБ-ВС с 07:00 до 16:00 МСК.

