# Консультирование по картам
card: 
  Reply:
    С каким продуктом связан ваш вопрос?
  Buttons:
    - text: Дебетовая карта
      transition: /CardsConsultation/Card/Debit
    - text: Кредитная карта
      transition: /CardsConsultation/Card/Credit

getDebitCards:
  InactiveAPI:
    CardBalance: Уточнить баланс карты вы можете в разделе «Главная» -> «Карты».
    CardConditions: Информацию о тарифе и условиях вашей карты вы можете получить в разделе «Главная» -> «Карты» -> «О карте» -> «Условия обслуживания».

getCreditCards:
  InactiveAPI:
    CardBalance: |
      На главном экране:
      1. Выберите кредитную карту - «Подробнее об условиях»
      2. Выберите «Общая задолженность» или «Задолженность периода»
      Вам откроется информация о доступном балансе, сумме задолженности. Там же вы увидите сумму и дату погашения ближайшего минимального ежемесячного платежа.

    CardConditions: Информацию о тарифе и условиях вашей карты вы можете получить в разделе «Главная» -> «Карты» -> «О карте» -> «Условия обслуживания».

askAboutOldOrNew:
  Reply:
    Вас интересуют подробности о вашей карте или о новом продукте?
  Buttons:
    - text: Моя карта
      transition: /CardsConsultation/Card/AskAboutOldOrNew/Current
    - text: Новая карта
      transition: /CardsConsultation/Card/AskAboutOldOrNew/New

askAboutProfit:
  Reply:
    Вам требуется информация о карте «Прибыль»?
  Buttons:
    - text: Да
      transition: /CardsConsultation/Card/AskAboutProfit/Agree
    - text: Нет
      transition: /CardsConsultation/Card/AskAboutProfit/Disagree

debitInfoCard:
  Reply:
    - Уточните, какая операция вам требуется?
    - Выберите интересующую вас операцию.
  ButtonsIfProfitCardIsNeeded:
    - text: Информация о тарифе и условиях
      transition: /CardsConsultation/Card/Debit/Info/Terms
    - text: Баланс по карте
      transition: /CardsConsultation/Card/Debit/Info/Balance
    - text: Оборот по «Уралсиб Бонус»
      transition: /CardsConsultation/Card/Debit/Info/ProfitBonus
    - text: Оборот для условий бесплатности
      transition: /CardsConsultation/Card/Debit/Info/ProfitFree
    - text: Сумма начисленных процентов
      transition: /CardsConsultation/Card/Debit/Info/ProfitPercent
    - text: Ставка по карте
      transition: /CardsConsultation/Card/Debit/Info/ProfitRate
    - text: Готовность карты
      transition: /CardsConsultation/Card/Status
    - text: Установка или смена ПИН
      transition: /CardsConsultation/Card/PIN
    - text: Заблокировать карту
      transition: /CardsConsultation/Card/Block
    - text: Разблокировать карту
      transition: /CardsConsultation/Card/Unblock
    - text: "Перевыпустить"
      transition: "/CardsConsultation/Card/Reissue"
    - text: Другое
      transition: /CardsConsultation/Card/Debit/Info/Other
  ButtonsIfNotProfitCardIsNeeded:
    - text: Информация о тарифе и условиях
      transition: /CardsConsultation/Card/Debit/Info/Terms
    - text: Баланс по карте
      transition: /CardsConsultation/Card/Debit/Info/Balance
    - text: Готовность карты
      transition: /CardsConsultation/Card/Status
    - text: Установка или смена ПИН
      transition: /CardsConsultation/Card/PIN
    - text: Заблокировать карту
      transition: /CardsConsultation/Card/Block
    - text: Разблокировать карту
      transition: /CardsConsultation/Card/Unblock
    - text: "Перевыпустить"
      transition: "/CardsConsultation/Card/Reissue"
    - text: Другое
      transition: /CardsConsultation/Card/Debit/Info/Other

debitInfoTerms:
  IsNotAuthorized: |
    Информацию о тарифе и условиях вашей карты вы можете получить:
    • В «Уралсиб Онлайн» в разделе «Главная» -> «Карты» -> «О карте» -> «Условия обслуживания»
    • В чате «Уралсиб Онлайн»
    • На сайте банка в разделе «Дебетовые карты» по [ссылке](https://www.uralsib.ru/tarify).
  IsAuthorized: |
    Информацию по карте *{{$session.chosenCard.pan}} вы можете получить по [ссылке]({{$temp.debitCardConditionsLink}})

debitInfoBalance: |
  Уточнить баланс карты вы можете:
  • В «Уралсиб Онлайн» в разделе «Главная» -> «Карты»
  • В чате «Уралсиб Онлайн»
  • В банкоматах банка Уралсиб

debitInfoBonus:
  IsNotAuthorized: |
    Информацию о потраченной сумме, которая вошла в оборот по «Уралсиб Бонус», вы можете уточнить в личном кабинете «Уралсиб Онлайн» в разделе «Главная» -> «Уралсиб Бонус».
  IsAuthorized: |
    Информацию о потраченной сумме, которая вошла в оборот дебетовой карты *{{$session.chosenCard.pan}} по «Уралсиб Бонус», вы можете уточнить по [ссылке]({{$temp.debitCardProfitBonusLink}})
  InactiveAPI: |
    Информацию о потраченной сумме, которая вошла в оборот по «Уралсиб Бонус», вы можете уточнить в разделе «Главная» -> «Уралсиб Бонус».

debitInfoFree: 
  Reply: Подробнее об условиях бесплатности вы можете уточнить в личном кабинете «Уралсиб Онлайн» в разделе «Главная» -> «О карте». 
  InactiveAPI: Информацию об условиях бесплатности вы можете уточнить в разделе «Главная» -> «О карте».

debitInfoPercent:
  IsNotAuthorized: |
    Информацию о сумме начисленных процентов по карте «Прибыль» вы можете уточнить в личном кабинете «Уралсиб Онлайн» в разделе «Главная» -> «Карты» -> «О карте» -> «Выписка».
  IsAuthorized: |
    Информацию о сумме начисленных процентов по карте *{{$session.chosenCard.pan}} вы можете уточнить по [ссылке]({{$temp.debitCardProfitPercentLink}})
  InactiveAPI: |
    Информацию о сумме начисленных процентов по карте «Прибыль» вы можете уточнить в разделе «Главная» -> «Карты» -> «О карте» -> «Выписка».

debitInfoRate:
  IsNotAuthorized: |
    Информацию о ставке по карте «Прибыль» вы можете уточнить в личном кабинете «Уралсиб Онлайн» в разделе «Главная» -> «Карты» -> «Выбрать карту».
  IsAuthorized: |
    Информацию о ставке по карте *{{$session.chosenCard.pan}} вы можете уточнить по [ссылке]({{$temp.debitCardProfitRateLink}})
  InactiveAPI: |
    Информацию о ставке по карте «Прибыль» вы можете уточнить в разделе «Главная» -> «Карты» -> «Выбрать карту».

debitInfoOther: Для консультации по картам перевожу на оператора.

debitGetBalance:
  Баланс дебетовой карты *{{$session.chosenCard.pan}} составляет {{$temp.rubleForm}}.

debitGetFreeAmount:
  - |
    Хорошая новость: вы выполнили условия бесплатного обслуживания карты в этом месяце.
  - |
    Условие бесплатности {{$session.chosenCard.free.status}}.

