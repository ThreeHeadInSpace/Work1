StopList:
    reply: 
      - |
       Чтобы убрать карту из стоп-листа, нужно определить транспортную компанию, у которой не прошла оплата. В каждом регионе свой оператор - проверить можно здесь: https://bilet.nspk.ru/ 
       Далее:
       1. Войдите или зарегистрируйтесь в личном кабинете пассажира.
       2. Проверьте историю платежей.
       3. Оплатите долг.
      - |
