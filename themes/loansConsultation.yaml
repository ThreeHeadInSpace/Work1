# Кредитные продукты
Loan:
  Reply:
    - О каком продукте вы хотите задать вопрос?
    - С каким продуктом связан ваш вопрос?

# Тут в некоторых кнопках не указан transition потому что в сценарии нам надо 
# для проставления флагов $session.userNeeds.mortgage и $session.userNeeds.carLoan
# переходить по сущностям, а при переходе по кнопкам сущности не сохраняются в $enteties
  Buttons:
    - text: "Кредитная карта"
      transition: "/CardsConsultation/Card/Credit"
    - text: "Потребительский кредит"
    - text: "Автокредит"
    - text: "Ипотека"
    - text: "Другое"
      transition: "/LoansConsultation/Loan/Other"

Other:
  - Ознакомиться с имеющимися кредитными продуктами и условиями их оформления вы можете по [ссылке]({{$temp.LoanLink}})
  
AskAboutOldOrNew:
  Reply:
    - Вас интересуют подробности о действующем кредите или о новом продукте?
  
  Buttons:
    - text: "Мой кредит"
      transition: "/LoansConsultation/Loan/AskAboutOldOrNew/Current"
    - text: "Новый продукт"
      transition: "/LoansConsultation/Loan/AskAboutOldOrNew/New"
      
  Current:
    - | 
     Уточнить данные о кредите можно:
      • В «Уралсиб Онлайн» в разделе «Кредиты»
      • В чате «Уралсиб Онлайн»
     
ToOperator: Для уточнения информации по кредиту перевожу на оператора.

ChooseLoan: Выберите кредит, по которому вам требуется информация.

Info:
  Reply: Что именно вы хотите узнать?
  
  Buttons:
    - text: "Информация о задолженности"
      transition: "/LoansConsultation/Loan/Info/Details"
    - text: "Досрочное погашение кредита"
      transition: "/LoansConsultation/Loan/Repayment"
      
  Details:
    - |
     На {{ $temp.loan.currentDate }} по кредитному договору №{{ $session.loan.num }}:
      • Задолженность {{ $temp.loan.debtSum }}
      • Текущая ставка {{ $session.loan.rate }}%
      • Дата следующего платежа — {{ $temp.loan.dateNextPay }}
      • Сумма следующего платежа — {{ $temp.loan.sumNextPay }}
      • Дата последнего платежа по кредиту — {{$temp.loan.lastPay }}

    - "Посмотреть подробности можете в [личном кабинете]({{$temp.loan.DBOLoanDetailsLink}})"
    
Repayment:
  Reply: Какой вид досрочного погашения вас интересует?
  
  Buttons:
    - text: "Частичное"
      transition: "/LoansConsultation/Loan/Repayment/Part"
    - text: "Полное"
      transition: "/LoansConsultation/Loan/Repayment/Full"
      
  Part:
    NotAuthorized:
      - Для частичного досрочного погашения нужно оформить заявление. Дата регистрации заявления совпадает с датой досрочного погашения.
      
      - Если заявление зарегистрировано в выходной или праздничный день, то оно будет исполнено на следующий рабочий день.
      
      - |
       Заявление на досрочное погашение можно оформить:
        • В личном кабинете «Уралсиб Онлайн». В разделе «Кредиты» выберите кредит, далее «Досрочное погашение»
        • В офисе банка
    
    Authorized:
      - Для частичного досрочного погашения нужно оформить заявление.
      
      - "Подать заявление на досрочное погашение кредитного договора №{{ $session.loan.num }} вы можете по [ссылке]({{$temp.LoanPartRepaymentLink}})"
      
  Full:
    Reply:
      - Для полного досрочного погашения кредита нужно подать заявление и обеспечить наличие суммы на счете в дату, которая указана в заявлении.
    
    NotAuthorized:
      - |
       Заявление на досрочное погашение можно оформить:
        • В личном кабинете «Уралсиб Онлайн». В разделе «Кредиты» выберите кредит, далее «Досрочное погашение»
        • В офисе банка
    
    Authorized:
      - "Подать заявление на полное досрочное погашение кредитного договора №{{ $session.loan.num }} можно по [ссылке]({{$temp.LoanFullRepaymentLink}})"
   
RepaymentStatus:
  - Статус исполнения заявки на досрочное погашение можно отследить в разделе «История операций».
  
  - |
    Заявки обрабатываются в рабочие дни, за час до закрытия операционного дня (ориентировочное время закрытия 22:00 по МСК). 
    Заявка, поданная за час до закрытия или во время закрытия операционного дня — аннулируется.
  
  - |
    После исполнения частичного досрочного погашения, новый график платежей отобразится в онлайн-банке и будет направлен на электронную почту за полчаса до закрытия операционного дня.
    При досрочном погашении с уменьшением платежа перерасчет будет со следующего периода.

RepaymentChange:
  Reply: Заявку на какой вид досрочного погашения вы бы хотели отредактировать или аннулировать?
  
  Buttons:
    - text: "Частичное"
      transition: "/LoansConsultation/Loan/RepaymentChange/Part"
    - text: "Полное"
      transition: "/LoansConsultation/Loan/RepaymentChange/Full"

  Full:
    - Заявку, оформленную в приложении, отменить нельзя.
    
    - Если заявление написано в офисе, при нехватке средств на счете погашения по кредиту спишется только имеющаяся сумма.
  
  Part:
    - Самостоятельно аннулировать заявку можно только до наступления даты исполнения заявки.
    
    - |
     Аннулировать заявку можно в офисе, если погашение еще не исполнено.

     Список отделений доступен по [ссылке]({{ $temp.officeLink }})
     
Encumbrance:
  Reply: Вы приобретали готовое или строящееся жилье?
  
  Buttons:
    - text: "Готовое жилье"
      transition: "/LoansConsultation/Loan/Encumbrance/Ready"
    - text: "Строящееся жилье"
      transition: "/LoansConsultation/Loan/Encumbrance/Building"

  Ready:
    - "Нужно подать заявление на снятие обременения по инструкции на сайте банка, в разделе «Вопросы и ответы» -> «Условия обслуживания» -> [«Действия после полного погашения ипотечного кредита»](https://www.uralsib.ru/ipoteka)."
    
  Building:
    Reply: Ваш объект недвижимости уже построен и сдан?
    
    Buttons:
      - text: "Да"
        transition: "/LoansConsultation/Loan/Encumbrance/Building/Done"
      - text: "Нет"
        transition: "/LoansConsultation/Loan/Encumbrance/Building/Still"
        
    Done:
      - "Нужно оформить право собственности и закладную по инструкции на сайте банка, в разделе «Вопросы и ответы» -> «Условия обслуживания» -> [«Новостройка. Как оформить собственность и закладную»](https://www.uralsib.ru/ipoteka)."
    
    Still:
      - "Нужно подать заявление на снятие обременения по инструкции на сайте банка, в разделе «Вопросы и ответы» -> «Условия обслуживания» -> [«Действия после полного погашения ипотечного кредита»](https://www.uralsib.ru/ipoteka)."
       
VehiclePassport:
  Reply:
    - Для того, чтобы я могу проинформировать вас по вопросам ПТС, укажите город, в котором вы оформляли автокредит.
  
  SaintP:
    - В течение 5 рабочих дней после погашения автокредита с вами свяжется ответственный сотрудник и пригласит в отделение для выдачи ПТС. Пожалуйста, ожидайте звонка.
  
  Ufa:
    - |
     Необходимо обратиться в отделение банка, где вы оставляли ПТС.
 
     Если вы оставляли ПТС в автосалоне, то необходимо обратиться в отделение по адресу: г. Уфа ул. Крупской 9.
     
InactiveAPI:
  PayOff: Для досрочного погашения нужно оформить заявление. Для этого в разделе «Кредиты» выберите кредит, далее «Досрочное погашение».
  Other: Для получения информации о задолженности и платежах в разделе «Кредиты» выберите нужный продукт.
  
RepaymentClarify:
  Reply: Какой у вас вопрос по досрочному погашению?
  
  Buttons:
    - text: "Оформить заявку"
      transition: "/MobileAppNavigation/DBONavigation/Loans/EarlyRepayment"
    - text: "Статус заявки"
      transition: "/LoansConsultation/Loan/RepaymentStatus"
    - text: "Как изменится срок или платеж"
      transition: "/LoansConsultation/Loan/RepaymentCalculation"
    - text: "Отменить или изменить заявку"
      transition: "/LoansConsultation/Loan/RepaymentChange"
    - text: "Справка о досрочном погашении"
      transition: "/Statements/Statements/LoanClosed"
      
RepaymentCalculation:
    NotAuthorized:
      - |
       Рассчитать, как изменится платеж или срок кредита после частичного досрочного погашения, можно:
       • В мобильном приложении [«Уралсиб Онлайн»](https://uralsib.ru/online)
       • [веб-версии на сайте](https://online.uralsib.ru) при оформлении заявки 
       Для этого выберите «Уменьшить платеж» или «Сократить срок» и укажите сумму, которую планируете внести.
    
    Authorized:
      - |
       Рассчитать, как изменится платеж или срок кредита после частичного досрочного погашения, можно при оформлении заявки. 
       Для этого выберите «Уменьшить платеж» или «Сократить срок» и укажите сумму, которую планируете внести.
       
    Final:
      - При частичном досрочном погашении сумма направляется на погашение основного долга.
