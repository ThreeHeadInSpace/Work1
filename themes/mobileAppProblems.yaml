registration:
  answer:
    На каком этапе возникает ошибка?
  buttons:
    - text: Не принимает номер счета
      transition: /MobileAppProblems/Registration/AccountNumber
    - text: Не принимает номер карты
      transition: /MobileAppProblems/Registration/CardNumber
    - text: Не принимает номер телефона
      transition: /MobileAppProblems/Registration/PhoneNumber
    - text: Не предоставлен пароль для первого входа
      transition: /MobileAppProblems/Registration/Password
    - text: Другое
      transition: /MobileAppProblems/Registration/Other

accountNumber: |
  При регистрации можно использовать 20-значный номер счета, указанный в документах при оформлении договора, или 16-значный номер карты Уралсиб с лицевой стороны карты.
  Проверьте корректность вводимых данных.

cardNumber: |
  Номер карты Уралсиб указан на лицевой стороне карты и состоит из 16-ти цифр. Также при регистрации можно использовать 20-значный номер счета, указанный в документах при оформлении договора
  Проверьте корректность вводимых данных.

phoneNumber: |
  Для входа в личный кабинет необходимо использовать номер российских операторов связи, зарегистрированный в банке. 
  Если у вас новый номер, предварительно подтвердите его через звонок на горячую линию или офис Уралсиба.

password: |
  Пароль был выслан вам в СМС сообщении от банка. Если вы уже заходили с ним и изменили пароль, то воспользуйтесь собственным паролем. Если забыли текущий пароль:
  1. Из меню ввода короткого кода или биометрии сверху-справа нажмите «Выйти»
  2. Выберите «Напомнить пароль»
  3. Введите номер телефона или карты, нажмите «Продолжить»
  4. Введите код из СМС
  5. Задайте новый пароль, нажмите «Подтвердить»

otherStage:
  Это немного выше моего цифрового понимания. Давайте подключим человека.

logInError:
  answer:
    Уточните, с чем именно возникает ошибка при входе?
  buttons:
    - text: Отпечаток пальца
      transition: /MobileAppProblems/LogInError/FastLogin
    - text: ПИН-код
      transition: /MobileAppProblems/LogInError/FastLogin
    - text: Face ID
      transition: /MobileAppProblems/LogInError/FastLogin
    - text: Логин и пароль
      transition: /MobileAppProblems/LogInError/Login
    - text: Другое
      transition: /MobileAppProblems/LogInError/Other

fastLoginMethod: |
  Ошибка авторизации по биометрии может возникать по причине смены или сбое настроек телефона. 
  Рекомендуется совершить вход в систему с логином и паролем и установить «Быстрый вход» заново.

loginMethod: 
  - |
    При входе в систему необходимо использовать зарегистрированный в банке телефон в качестве логина.
    Пароль по СМС отправляется первоначальный. Если ранее вы уже заходили в «Уралсиб Онлайн» с этим паролем, то должны были поменять его на собственный.
  - |
    Восстановить пароль возможно:
    • В мобильном приложении
    • В веб-версии «Уралсиб Онлайн»
    • В офисе банка
  
otherMethod:
  Очень хочу помочь, но пока не умею работать с таким запросом. Уже зову коллегу, чтобы вы не остались без ответа.

productInformation:
  answer:
    С чем связана ваша проблема?
  buttons:
    - text: Обновить состояние продуктов
      transition: /MobileAppProblems/ProductInformation/NoState
    - text: Не отображается карта
      transition: /MobileAppNavigation/DBONavigation/DisplayCards/ShowCard
    - text: Не отображается счет или кредит
      transition: /MobileAppProblems/ProductInformation/NoNewProducts
    - text: Другое
      transition: /MobileAppProblems/ProductInformation/Other

noState:
  Обновление происходит автоматически при входе в систему. Иногда, при нестабильном интернет соединении, этого не происходит. Попробуйте обновить экран вручную свайпом, протянув пальцем в приложении сверху вниз.

noNewProducts: |
  В таком случае возможны 2 варианта:
   • Продукт в процессе открытия – данная ситуация длится не более суток. Пожалуйста, проверьте информацию позднее.
   • Информация не обновилась при входе. Попробуйте обновить экран вручную свайпом, протянув пальцем в приложении сверху вниз.

otherProductInformation:
  Сейчас это не входит в мои задачи. Давайте позовем специалиста.

