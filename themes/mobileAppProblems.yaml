# Проблемы в работе мобильного приложения
mobileProblem:
  ios:
    Должен предупредить, что ваша версия приложения устарела. Чтобы использовать максимум преимуществ, установите веб-версию. В браузере Safari перейдите по ссылке и следуйте [инструкции](https://uralsib.ru/online/ios).
  android:
    Должен предупредить, что ваша версия приложения устарела. Чтобы использовать максимум преимуществ, [обновите его](https://uralsib.ru/online/android). После обновления большинство ошибок, как правило, устраняется.
  finalReply:
    Уточните, на каком этапе происходит ошибка?
  buttons:
    - text: Скачивание приложения
      transition: /MobileAppProblems/DownloadApp
    - text: Вход в систему
      transition: /MobileAppProblems/LogInError
    - text: Просмотр информации о продуктах
      transition: /MobileAppProblems/ProductInformation
    - text: Другое
      transition: /MobileAppProblems/MobileProblem/Other

otherProblem:
  Это немного выше моего цифрового понимания. Давайте подключим человека.

