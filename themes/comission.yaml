Day120:
    reply: 
        - |
          Переводы с кредитной карты:
          · По номеру карты или СБП в пределах ежемесячного лимита – без комиссии
          · По счету – с комиссией, размер комиссии можно уточнить на [сайте](https://uralsib.ru/tarify) в разделе «Денежные переводы»
        - |
          Снятие наличных – без комиссии.
          Важно: эти операции не входят в льготный период кредитования.
        - |
         Самостоятельно посмотреть комиссии можно на [сайте банка](https://uralsib.ru/faq/personal/kreditnye-karty).

Cashback:
    reply: 
        - |
          Размер комиссии за снятие наличных и переводы с кредитной карты на карты Уралсиба и других банков: 3,99% от суммы операции + 300 руб.
          Важно: эти операции не входят в льготный период кредитования.
        - |
         Самостоятельно посмотреть комиссии можно на [сайте банка](https://uralsib.ru/kreditnye-karty/cashback).
         
WithdrawDebitCard:
    reply: 
        - |
          Комиссия за выдачу наличных:
          • В банкоматах Уралсиба — без комиссии
          • В банкоматах банков-партнеров снятие до 300 000 руб. в месяц — без комиссии, свыше — 2% от суммы, но не менее 299 руб.
          • В сторонних банкоматах — 2% от суммы, но не менее 299 руб.
          • Для зарплатных карт: снятие наличных в банкоматах сторонних банков (вне списка партнеров) – до 100 000 руб. в месяц - без комиссии, свыше – 2% от суммы, но не менее 299 руб.
        - |
          Самостоятельно посмотреть комиссии можно на [сайте банка](https://uralsib.ru/tarify).
         
