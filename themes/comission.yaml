Replenish: 
    reply: 
        - |
         Способы пополнения:
         1. Перевод с карты любого банка, без комиссии с нашей стороны:
         • В приложении выберите пункт «Платежи» — «С карты на карту»
         • В поле «С карты» укажите «Новая карта»
        - |
         2. Запрос через СБП: в приложении выбрать «Платежи» – «Себе из другого банка»
         3. В офисе банка, нужен паспорт.
         При внесении наличных от 100 до 50 000 руб. взимается комиссия — 500 руб.
         4. В банкоматах Уралсиба — без комиссии.
        - |
         Самостоятельно посмотреть комиссии можно на [сайте банка](https://uralsib.ru/tarify).
    buttons:
      - text: Подобрать банкомат
        transition: "/AddressesUralsib/ATMOrOffice"
        
Disagree:
    NotAuthorized:
        - |
          Комиссии взимаются согласно вашему тарифу. Подробную информацию о нем вы можете посмотреть:
          • В приложении «Уралсиб Онлайн»: выберите нужную карту — раздел «О карте»
          • В [веб-версии](https://online.uralsib.ru/) на главной странице выберите нужную карту и в разделе «Информация» выберите пункт «Условия обслуживания»
        - |
         Если комиссия была списана, хотя она не предусмотрена, или вы столкнулись с оплатой за услугу, которую не подключали — напишите в чат приложения для уточнения информации. 
 
    Mobile:
