ServiceCreditCard:
    NotAuthorized:
        - |
          Посмотреть размер комиссии по кредитной карте можно:
          • В приложении «Уралсиб Онлайн»: выберите нужную карту — раздел «О карте»
          • В [веб-версии](https://online.uralsib.ru/) на главной странице выберите нужную карту и в разделе «Информация» выберите пункт «Условия обслуживания»
    Mobile:
        - |
         Для просмотра размера комиссии по кредитной карте:
         1. На главное странице выберите нужную карту
         2. Раздел «О карте» — «Условия обслуживания»
    Web:
        - |
         Для просмотра размера комиссии по кредитной карте: 
