Remove:
    - Для консультации по действующим арестам обратитесь к судебному приставу-исполнителю по месту регистрации.
    - Посмотреть информацию по действующим арестам можно на официальном [сайте ФССП](https://fssp.gov.ru/iss/ip)
    
NotRemoved:
  NotAuthorized: 
    - Арест со счета снимается в течение 7 -10 рабочих дней с момента поступления в банк документов о снятии.
    - Чтобы уточнить детали напишите в чат приложения [«Уралсиб Онлайн»](https://uralsib.ru/online) или в [веб-версии на сайте](https://online.uralsib.ru)
  Reply: Арест со счета снимается в течение 7 -10 рабочих дней с момента поступления в банк документов о снятии.
  Buttons: 
    - text: "Срок вышел"
      transition: "/Arrest/NotRemoved/TimeOff"
    - text: "Срок не вышел"
      transition: "/Arrest/NotRemoved/TimeNotOff"   
      
TimeOff: Узнать, почему не снят арест, поможет оператор.

TimeNotOff: Ожидайте, пожалуйста, снятия ареста в указанные сроки. 

LivingWage:
  reply: Уточните, какой у вас вопрос по прожиточному минимуму?
  buttons: 
    - text: "Заявление на прожиточный минимум"
      transition: "/Arrest/LivingWage/Documents"
    - text: "Списали сверх лимита"
      transition: "/Arrest/LivingWage/Funds" 
    - text: "Код вида дохода"
      transition: "/Arrest/LivingWage/Code"   

Documents:
  reply:
    - |
      Если счет арестован ФССП, подайте судебному приставу заявление о сохранении прожиточного минимума. Приложите:
      • Документы о ежемесячном доходе и его источниках
      • Заявление с реквизитами счета и данными банка (образец — на сайте ФССП)
      Рассмотрение документов на прожиточный минимум в банке длится до 2-х рабочих дней. Если рассмотрение документов затянулось — обратитесь к приставу повторно.
      Важно: алименты не учитываются при сохранении прожиточного минимума.
    - |
      Если арест наложен не ФССП, подайте заявление о сохранении прожиточного минимума в офисе банка.
    
Funds:
  reply:
    - |
      Взыскание считается корректным, если:
      • На счет поступило несколько доходов подряд
      • Код дохода позволяет списание в пользу ФССП
    - | 
      Когда на счет приходят две зарплаты — последняя удерживается не более 50% или 70%. Если деньги с прошлой зарплаты не были потрачены, их могут направить на погашение долга.
      Для сохранения прожиточного минимума на счете, подайте соответствующее заявление.
  buttons: 
    - text: "Проверить код вида дохода"
      transition: "/Arrest/LivingWage/Code"
    - text: "Направить заявление"
      transition: "/Arrest/LivingWage/Documents" 
    - text: "Заявление уже было направлено"
      transition: "/Feedback/Feedback/Claim/ImpossibleTransactions"   
     
Code:
    - |
      При удержании дохода по исполнительным документам учитывается код дохода:
      • КВД = 1: взыскивают 50–70%, в зависимости от предмета исполнения
      • КВД = 2: разовые выплаты: взыскание запрещено
      • КВД = 3: периодические выплаты: только алименты или возмещение вреда здоровью
    - Код дохода указан в платежном поручении — строка «Назначение платежа». Заказать поручение можно в офисе банка.