Arrest:
  Reply: Какая информация об арестах вас интересует?

  Buttons: 
    - text: "Наличие ареста и детали"
      transition: "/Arrest/Info"
    - text: "Погашение кредита при аресте"
      transition: "/Arrest/Repayment"
    - text: "Снять арест"
      transition: "/Arrest/Remove"
    - text: "Почему не сняли арест"
      transition: "/Arrest/NotRemoved"

Repayment:
  NotAuthorized:
    - |
     Оплатить задолженность можно:
     • Переводом средств на ссудный счет из стороннего банка или на транзитный счет 40911 в кассах Уралсиб
     • Со счета 3-го лица, привязав его

    - 'Третьим лицом является любое физическое лицо. В офисе нужно открыть счет и подписать заявления. Потребуется паспорт.'

    - 'Для снятия задолженности и ареста обратитесь в ФССП. Более подробную информацию по постановлению можно получить при личном обращении в Исполнительный орган или на [сайте ФССП](https://fssp.gov.ru/).'

  HasArrest:
    - |
     Оплатить задолженность можно:
     • Переводом средств из стороннего банка на ссудный счет {{ $temp.loanAccount }}
     • Переводом средств на транзитный счет 40911 в кассах Уралсиб
     • Со счета 3-го лица, привязав его

    - Третьим лицом является любое физическое лицо. В офисе нужно открыть счет и подписать заявления. Потребуется паспорт.

    - 'Для снятия задолженности и ареста обратитесь в ФССП. Более подробную информацию по постановлению можно получить при личном обращении в Исполнительный орган или на [сайте ФССП](https://fssp.gov.ru/).'

ThirdPersonAccount:
  - Для подачи заявления на открытие счета нужно обратиться совместно с 3-им лицом в отделение банка в пределах филиала открытия кредитного счета заемщика. При себе нужен паспорт.
  - Адреса и режим работы офисов банка вы найдете в [этом разделе]({{$temp.officeLink}})

LoanAccount: Для получения реквизитов ссудного счета перевожу на оператора. Оставайтесь в чате.

TransitAccount:
  - |
    При оплате через транзитный счет нужно учитывать, что:
    • Срок зачисления средств строго в день платежа по кредиту
    • Ограничено время приема средств на счет до 18:00 по мск с пн по пт
    • В остальные дни, а также в будни после 18:00 по МСК зачисления не принимаются
  - |
    Также 3-е лицо может внести платеж вместо заемщика через транзитный счет на основании заполненного в офисе заявления. Для заполнения заявления нужен номер кредитного договора и ФИО заемщика.

Info:
  NotAuthorized: Уточнить наличие ареста и его детали вы можете на сайте ФССП.

  Reply: По какому постановлению вам требуется информация?

ToOperator: Для продолжения консультации по аресту переключаю вас на оператора.

NoArrest: 
  - |
    На текущий момент действующего ареста от судебных приставов на ваших счетах не обнаружено.
    Проверить налоговый арест можно при личном обращении в ФНС или в [личном кабинете налогоплательщика](https://lkfl2.nalog.ru/lkfl)

Details:
  - |
   На текущий момент у вас есть активный арест денежных средств согласно постановлению {{$session.arrest.resNumber}} от {{ $session.arrest.resDate }}.
   • Сумма ареста — {{ $temp.amountRubleForm }}
   • Остаток к исполнению — {{ $temp.remainRubleForm }}
   • Исполнительный орган — {{ $session.arrest.ipOffice }}
   • Пристав — {{ $session.arrest.pristav }}

  - 'Более подробную информацию по постановлению вы можете уточнить при личном обращении в Исполнительный орган или на [сайте Федеральной службы судебных приставов](https://fssp.gov.ru/).'
  
