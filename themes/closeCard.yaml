#Вопрос по закрытию карт
CloseCard:
    reply:
        - Уточните, какую карту хотите закрыть?
    buttons:
        - text: Дебетовая карта
          transition: "/CloseCard/CloseCard/DebitCard"
        - text: Кредитная карта
          transition: "/CloseCard/CloseCard/CreditCard"
          
DebitCard:
    isNotAuthorized: |
        Закрыть дебетовую карту можно:
        • В [офисе банка]({{$temp.OfficeLink}})
        • В приложении «Уралсиб Онлайн»: выберите нужную карту -> в разделе «Управление» выберите пункт «Закрыть»
        • В [веб-версии](https://online.uralsib.ru/) на главной странице выберите нужную карту и нажмите «Закрыть счет»
    web: |
        Для закрытия карты:
        1. На главном экране выберите нужную карту на главной странице.
        2. Нажмите «Закрыть».
    iosOrAndroid: |
        Для закрытия карты:
        1. Выберите нужную карту.
        2. Войдите в раздел «Управление».
        3. Выберите пункт «Закрыть».
    final: |
        Для закрытия дебетовой карты убедитесь, что:
        • На карте нет задолженности и баланс равен нулю
        • Карта не используется для погашения кредита и начисления процентов по вкладу
        • В настройках СБП счет карты не установлен основным для зачислений

        Если карта является единственной, то закрыть можно в офисе или контакт-центре.  

CreditCard:
    isNotAuthorized: |
        Закрыть кредитную карту можно:
        • В [офисе банка]({{$temp.OfficeLink}})
        • В чате банка
        • В контакт-центре по номеру горячей линии 8-800-250-57-57
    Authorized: 
        - Можно просто не пользоваться картой, но оставить ее на случай непредвиденных расходов. 
        - Открыть новую кредитную карту позже может быть сложнее, чем сохранить текущую.
          При этом лимит не обязывает тратить — это как финансовая подушка.
        - Кредитная карта может быть резервом — даже если вы ей не пользуетесь регулярно. Давайте оставим ее?
        
Agree: 
  - |
    Рады вашему решению!
    Вы точно знаете, как сделать финансы удобнее. Если что — всегда поможем!
    
Disagree: Для уточнения возможности закрытия карты перевожу на оператора. Оставайтесь в чате.
