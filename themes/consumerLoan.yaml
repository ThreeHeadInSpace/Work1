# Потребительский кредит
ConsumerLoan:
  FirstAnswer:
    - Готов рассказать вам об оформлении потребительского кредита в Уралсибе.
    - Буду рад предоставить информацию о потребительском кредите.

  SecondAnswer:
    - Выберите, что именно вас интересует.
    - Выберите интересующий вас вариант.

  Buttons:
    - text: "Оформить заявку"
      transition: "/ConsumerLoan/ConsumerLoan/Request"
    - text: "Ознакомиться с условиями"
      transition: "/ConsumerLoan/ConsumerLoan/Conditions"

Request:
  NotAuthorized:
    - |
      Отличный выбор!
      У этого кредита масса преимуществ:
      • Оформление онлайн
      • Конкурентоспособные процентные ставки
      • Гибкие сроки кредитования 
      • Решение за 1 день
      • Возможность частичного и полного досрочного погашения без комиссий в любое время и любом объеме
      • Индивидуальный подход 

    - Подать заявку на потребительский кредит можно [тут]({{$temp.ConsumerLoanLink}})

  ConLoanOffer:
    - |
     {{ $session.name }}, вам доступно выгодное персональное предложение от банка на потребительский кредит:
      • до {{ $temp.offer.LIMIT_MAX_CHAR }} — уже одобрено
      • {{ $temp.offer.Ghost_privilege_1 }} {{ $temp.offer.Ghost_privilege_value_1 }}
      • срок от {{ $temp.offer.MIN_PERIOD }} до {{ $temp.offer.DURATION }} месяцев
      • на любые цели: кредит наличными или рефинансирование кредитов сторонних банков
   
    - Хотите подать заявку?
   
  CashLoanOffer:
    - |
     {{ $session.name }}, вам доступно специальное предложение по кредиту наличными на льготных условиях:
      • до {{ $temp.offer.LIMIT_MAX_CHAR }} — предварительно одобрено
      • Процентная ставка зависит от суммы и страхования: {{ $temp.offer.RANGE_1 }} от 9%, {{ $temp.offer.RANGE_2 }} от 9%, {{ $temp.offer.RANGE_3 }} от 9%, {{ $temp.offer.RANGE_4 }} от 9%
      • Срок до {{ $temp.offer.DURATION }} месяцев
      • На любые цели: кредит наличными или рефинансирование кредитов сторонних банков
   
    - Для оформления нужен паспорт РФ. При сумме кредита свыше 600 000 рублей дополнительно потребуется документ, подтверждающий доход. 
   
    - Хотите подать заявку?
   
  Agree: Для оформления заявки на потребительский кредит с условиями из персонального предложения перейдите по [ссылке]({{ $temp.OpenOfferCreditLink }})
    
  Disagree: Понял вас.
    
  NoOffer:
    - |
     У потребительского кредита в банке Уралсиб масса преимуществ:
      • Оформление онлайн
      • Конкурентоспособные процентные ставки
      • Гибкие сроки кредитования 
      • Решение за 1 день
      • Возможность частичного и полного досрочного погашения без комиссий в любое время и любом объеме
      • Индивидуальный подход 
     
    - "Подать заявку на потребительский кредит можно [тут]({{$temp.ConsumerLoanLink}})"

  Buttons:
    - text: "Да"
      transition: "/ConsumerLoan/ConsumerLoan/Request/Agree"
    - text: "Нет"
      transition: "/ConsumerLoan/ConsumerLoan/Request/Disagree"

Conditions:
  Answer:
    - Подскажите, вас интересует кредит для себя или на развитие бизнеса?

  Buttons:
    - text: "Для себя"
      transition: "/ConsumerLoan/ConsumerLoan/Conditions/Individual"
    - text: "На развитие бизнеса"
      transition: "/ConsumerLoan/ConsumerLoan/Conditions/Legal"

  Individual:
    Answer: |
      Требования к заемщику для оформления потребительского кредита:
      • Гражданство РФ с постоянной регистрацией на территории РФ
      • Минимальный возраст — 23 года (для клиентов, имеющих одобренное кредитное предложения от банка — 21 год)
      • Максимальный возраст на момент окончания срока кредита - 70 лет (для клиентов, имеющих одобренное кредитное предложения от банка — 75 лет)
      • Официальное трудоустройство более 3 месяцев
        
      Подскажите, вы подходите под эти требования?

    Buttons:
      - text: "Да"
        transition: "/ConsumerLoan/ConsumerLoan/Conditions/Individual/Agree"
      - text: "Нет"
        transition: "/ConsumerLoan/ConsumerLoan/Conditions/Individual/Disagree"

    Disagree: |
      Понял вас. К сожалению, в таком случае вам может быть отказано в оформлении потребительского кредита.

      Более подробные условия и ответы на часто задаваемые вопросы вы сможете найти по [ссылке]({{$temp.ConsumerLoanLink}})

IsBankClient:
  Answer: Для того, чтобы я проинформировал вас о тарифах, подскажите, вы являетесь клиентом банка Уралсиб?
  Buttons:
    - text: "Да"
      transition: "/ConsumerLoan/ConsumerLoan/IsBankClient/Agree"
    - text: "Нет"
      transition: "/ConsumerLoan/ConsumerLoan/IsBankClient/Disagree"

  Agree: Укажите предполагаемую сумму кредита.

  Disagree: Укажите предполагаемую сумму кредита.

Tariff:
  FirstAnswer:
    - |
      Процентная ставка составит:
      • Со страховкой — от {{$temp.tariff["InsuredRateRange"]}}
      • Без страхования — от {{$temp.tariff["RateRange"]}}
      Оформить страховку можно при оформлении кредита.

    - |
      Максимальный срок кредита — {{$temp.tariff["LoanTerm"]}}
      Максимальная сумма кредита — {{$temp.tariff["LoanMaxSumma"]}}

      Срок рассмотрения заявки составит {{$temp.tariff["ReviewPeriod"]}}

  FromLess:
    - |
     Документы для оформления кредита:
     • Паспорт РФ
     • Заявление-анкета
     • Второй документ, удостоверяющий личность (на выбор): водительские права, заграничный паспорт, ИНН, СНИЛС, документ, подтверждающий доход

  NotFromLLess:
    - |
      Документы для оформления кредита:
      • Паспорт РФ
      • Заявление-анкета
      • Документ, подтверждающий ваш доход за последний год (на выбор): справка о доходах и суммах налога ФЛ, справка о доходах по форме банка или организации, выписка ПФР, выписка с сайта Госуслуги, выписка по зарплатному счету стороннего банка

  FinalAnswer: Также отправляю вам ссылку на документ с подробным описанием [тарифного плана](https://uralsib.ru/api/directory-engine/files/rates/potreb_standart_300426_yzxkm9gt.pdf)

Proposal:
  Answer:
    - Хотите подать заявку на потребительский кредит?
    - Оформим заявку?
    - Желаете подать заявку?

  Buttons:
    - text: "Да"
      transition: "/ConsumerLoan/ConsumerLoan/Proposal/Agree"
    - text: "Нет"
      transition: "/ConsumerLoan/ConsumerLoan/Proposal/Disagree"

  Agree:
    - Оформить заявку на потребительский кредит вы можете по [ссылке]({{$temp.ConsumerLoanLink}})

  Disagree:
    - Потребительский кредит в банке Уралсиб может стать удобным инструментом для решения текущих потребностей. Банк предлагает гибкие условия и возможность выбора срока кредита, что помогает распределить платежи наиболее удобным образом и избежать лишних финансовых нагрузок.
    - Банк Уралсиб стремится предложить выгодные и прозрачные условия кредитования. Вы можете использовать кредит для достижения своих целей, а также рассчитывать на индивидуальный подход и поддержку со стороны банка на всём протяжении срока кредита.
    - Оформляя кредит сейчас, вы получаете доступ к одной из самых привлекательных ставок на рынке. Процентные ставки могут вырасти, что сделает их менее выгодными. Чтобы зафиксировать выгодные условия, вы можете оставить заявку прямо сейчас.
