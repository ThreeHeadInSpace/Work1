PayMicroloan:    
- |
 В первые 14 дней с даты выдачи займа досрочно погасить можно без заявления.
- |
 Если прошло более 14 дней, то заявление на досрочное погашение подается за 30 календарных дней до даты досрочного погашения займа.

 Написать заявление на полное или частичное досрочное погашение можно двумя способами:
 •    В любом отделении Уралсиба
 •    Через [личный кабинет МКК](https://lk.uralsibfinance.ru) в разделе «Главная» – «Займ» - «Досрочное погашение».
 
