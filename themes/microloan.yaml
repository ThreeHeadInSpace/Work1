Registration:
- |
  Зарегистрироваться в личном кабинете можно: 
  • на [сайте МКК](https://uralsibfinance.ru) 
  • через [личный кабинет](https://lk.uralsibfinance.ru) 
  Для регистрации:
  1. Введите номер телефона и паспортные данные, указанные при оформлении займа.
  2. Придумайте пароль (минимум 6 символов, с цифрой и заглавной буквой).
      
Problem:  
- |
  При сложностях со входом или работой личного кабинета МКК:
  · Отключите VPN
  · Почистите кэш
  · Воспользоваться другим браузером (Яндекс, Google).
- |
  Если ситуация не изменится, отправьте скриншот с ошибкой и описание проблемы на почтовый ящик info@uralsibfinance.ru 
  
Incorrect: Если данные по займу отображаются некорректно, отправьте скриншот и описание проблемы через форму обратной связи в [личном кабинете](https://lk.uralsibfinance.ru) раздел «Вопрос – ответ» - «Форма обратной связи».
  
PasswordProblem: 
- |
  Перед восстановлением пароля для личного кабинета МКК:
  · Отключите VPN
  · Почистите кэш
  · Воспользоваться другим браузером (Яндекс, Google).
    Для восстановления пароля на странице личного кабинета нажмите на кнопку «Регистрация / Восстановить пароль».
- |
  Если ситуация не изменится, отправьте скриншот с ошибкой и описание проблемы на почтовый ящик info@uralsibfinance.ru .
  
Documents: 
- |
  Для получения документов и справок по займу, вы можете:
  · Обратиться в офис банка Уралсиб
  · Скачать их в [личном кабинете](https://lk.uralsibfinance.ru) в разделе «Главная» - «Документы и информация по займам»
  · Оставить обращение на сайте ООО МКК «УРАЛСИБ Финанс» в разделе [«Написать нам»](https://uralsibfinance.ru/feedback)
- |
  Срок предоставления информации до 15 рабочих дней.
  
