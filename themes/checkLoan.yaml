# Статус кредитной заявки
CheckLoan:
  NotAuthorized: |
    Уточнить статус заявки на кредит можно:
     • В чате «Уралсиб Онлайн»
     • На горячей линии по номеру 8-800-250-57-57
  AnyActiveApplications: На данный момент у вас нет активных заявок на оформление кредитного продукта.
  
  toOperator: Для продолжения консультации переключаю вас на специалиста.

  List: 
    Refuse: Какую заявку на кредитный продукт хотите отменить?
    Check: По какой заявке на кредитный продукт хотите узнать статус?
  
  CatchAll:
    FirstReply:
      Refuse:
        - Какую заявку хотите отменить?
        - У вас несколько активных заявок на кредитные продукты. Выберите нужную.
      Check:
        - Статус какой заявки хотите узнать?
        - У вас несколько активных заявок на кредитные продукты. Выберите нужную.
    FinalReply: Для продолжения консультации переключаю вас на оператора.

  Info:
    Refuse:
      SignedContract: По заявке от {{ $session.chosenApplication.time }}  подписан договор, отменить ее нельзя. После зачисления средств можно погасить кредит досрочно.
      ClosingStage: Заявка от {{ $session.chosenApplication.time }} уже находится на этапе закрытия. Ее отмена не требуется.
      CreditCard: По заявке от {{ $session.chosenApplication.time }} вам уже выданы средства. Закрыть кредитную карту можно в офисе банка. Адреса и режим работы отделений вы найдете в [этом разделе]({{$temp.officeLink}}).
      EarlyRepayment: По заявке от {{ $session.chosenApplication.time }} вам уже выданы средства. Закрыть кредит можно через досрочное погашение.
      Other: Для продолжения консультации по отмене заявки переключаю вас на оператора.

    Check:
      ApplicationStatusDefined:
        - Хотите спросить что-то еще?
        - Могу ли я помочь чем-то еще?
        - Желаете задать еще вопрос?
      ApplicationStatusUndefined: Ваша заявка в работе. Для продолжения консультации переключаю вас на оператора. Пожалуйста, ожидайте.
      Buttons: 
        - text: "Назад к списку заявок"
          transition: "/CheckLoan/CheckLoan/List"
        - text: "Карты"
          transition: "/CardsConsultation/Card"
        - text: "Кредиты"
          transition: "/Loan/Loan"
        - text: "Вклады"
          transition: "/Deposits/Deposit"
        - text: "Платежи и переводы"
          transition: "/PaymentsAndTransfer/MoneyTransfer"
        - text: "Навигация в системе"
          transition: "/MobileAppNavigation/DBONavigation"

Refuse:
    reply: Банк оставляет за собой право не сообщать о возможных причинах отказа в оформлении кредита. При этом отказ по кредитной заявке не означает, что банк и в будущем не будет готов выдать вам кредит. Вы всегда можете подать заявку повторно.
    
