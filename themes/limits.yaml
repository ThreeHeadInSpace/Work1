# Лимиты
limit:
  answer: Ваш вопрос связан с лимитом. Чтобы я мог дать ответ, уточните, какой лимит вас интересует?
  buttons:
    - text: "На снятие наличных"
      transition: "/Limits/Limit/WithdrawCash"
    - text: "По кредитной карте"
      transition: "/Limits/Limit/CreditCard"
    - text: "Лимит на переводы"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Limits"

WithdrawCash:
  reply: 
   - |
    Чтобы посмотреть лимит на снятие наличных:
    1. Выберите нужную карту
    2. Нажмите на вкладку «Управление»
    3. Далее «Установить лимит»
   - |
    Дневной лимит обнуляется в 02:00 МСК.
    Месячный лимит — в первый день нового месяца, тоже в 02:00 МСК.
  buttons:
    - text: "Ограничения на снятие"
      transition: "/Limits/Limit/WithdrawCash/Restriction"
      
Restriction: |
      Если за последние 24 часа вы перевели себе по СБП больше 200 000 руб. из другого банка, то на 48 часов включается лимит: можно снять максимум 50 000 руб. в день в любом банкомате. 
      Лимит отключится автоматически. 
      
Transfer:
    reply: Уточните лимит какого перевода вас интересует.
    buttons:
        - text: "Перевод по реквизитам"
          transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Limits"
        - text: "Перевод по системе быстрых платежей (СБП)"
          transition: "/Limits/Limit/Transfer/SBP"
        - text: "Оплата услуг"
          transition: "/PaymentsAndTransfer/MoneyTransfer/Payments"
          
SBP: 
    start: |
        Лимиты на переводы без комиссии с дебетового счета по СБП:
        1. На свои счета — до 30 000 000 ₽ в месяц;
        2. На счета других клиентов — до 100 000 руб. в месяц.
        Комиссия на сумму превышения — 0,5% (не более 1 500 руб.).
    isNotAuthorized: |
        Посмотреть лимиты на переводы можно:
        • В приложении «Уралсиб Онлайн» 
        • В веб-версии на [сайте](https://online.uralsib.ru/)
        1. Внизу главного экрана раздел «Еще» 
        2. Пролистните страницу вниз до блока «Лимиты, доступные на сегодня»
        Там же можно изменить лимит на переводы.
    iosOrAndroid: |
        Для просмотра доступных лимитов:
        1. Внизу главного экрана раздел «Еще» 
        2. Пролистните страницу вниз до блока «Лимиты, доступные на сегодня»
        Там же можно изменить лимит на переводы.
    final: |
        При каждой операции система проверяет лимит:
        • суточный — за последние 24 часа
        • недельный — за последние 7 дней.
    buttons:
     - text: "Как совершить перевод?"
       transition: "/PaymentsAndTransfer/MoneyTransfer/SBP"
     - text: "Подключить или настроить СБП"
       transition: "/MobileAppNavigation/DBONavigation/Settings/PhoneTransfer"
    image:
       appjaicp: 2_22_3_лимиты
       uralsib: 2_22_3_limits

creditCard:
  answer: Уточните, пожалуйста, что вас интересует?
  buttons:
    - text: "Увеличить лимит"
      transition: "/Limits/Limit/CreditCard/Increase"
    - text: "Уменьшить лимит"
      transition: "/Limits/Limit/CreditCard/Decrease"
    - text: "Посмотреть лимит"
      transition: "/Limits/Limit/CreditCard/Check"
    - text: "Отсутствует лимит"
      transition: "/Limits/Limit/CreditCard/Zero"    
        
Increase:    
  - |
    Подать заявку на увеличение лимита по кредитной карте можно только в офисе банка в пределах филиала выпуска карты. Не забудьте взять с собой паспорт.
  - |
    Адреса и режим работы офисов банка вы найдете на нашем [сайте]({{$temp.officeLink}})
    
Decrease: 
  - Это дополнительная финансовая гибкость — особенно в поездках или неожиданных расходах. Предлагаю сохранить лимит — вы в любой момент сможете его изменить.
  - Конечно, решение за вами. Однако сейчас лимит уже одобрен — позже условия могут поменяться. При этом лимит не обязывает тратить. Это как финансовая подушка, лучше иметь и не использовать, чем наоборот.
  - Увеличенный лимит по кредитной карте — это просто запас на непредвиденные случаи. Вы не обязаны его использовать — он будет под рукой, если понадобится. Давайте оставим его?

Agree: |
    Рады вашему решению!
    Вы точно знаете, как сделать финансы удобнее. Если что — всегда поможем!
    
Disagree: По вопросу уменьшения кредитного лимита переключаю вас на оператора  
 
check:
    isNotAuthorized: Посмотреть лимит по кредитной карте можно в приложении «Уралсиб Онлайн» в разделе «Кредитная карта» и на главном экране и в веб-версии на [сайте](https://online.uralsib.ru/)
    iosOrAndroid: Посмотреть лимит по кредитной карте можно на главном экране в разделе «Кредитная карта».
    web: Посмотреть лимит по кредитной карте можно на главном экране и в веб-версии на [сайте](https://online.uralsib.ru/)
    
Zero:
    reply: Уточните, отсутствует лимит на недавно полученной или действующей кредитной карте?
    buttons:
        - text: "Недавно полученная"
          transition: "/Limits/Limit/CreditCard/Zero/New"
        - text: "Действующая карта"
          transition: "/Limits/Limit/CreditCard/Zero/Old"
                
New:
    reply:
        - |
          На новой кредитной карте может не быть лимита по следующим причинам:
          1. Действует период охлаждения – зависит от суммы: 
          • до 50 000 ₽ — лимит доступен сразу после активации карты 
          • от 50 000 до 200 000 ₽ — лимит появится через 4 часа после подписания договора 
          • от 200 000 ₽ — доступ к лимиту откроется не раньше чем через 48 часов после подписания договора
          Важно: ускорить этот процесс нельзя. Точное время окончания периода охлаждения можно проверить в личном кабинете в разделе «Информация по карте».
        - |
          2. Карта не активирована. В течение дня, после получения карты у курьера, вам поступит смс-сообщение об активации карты и установке PIN-кода.
        - |
          Если период охлаждения закончился и после выдачи карты курьером прошло более 1 календарного дня нажмите на кнопку «Лимит не начислен».
    buttons:
        - text: "Активировать карту"
          transition: "/CardsConsultation/Card/Activation/Delivery"
        - text: "Лимит не начислен"
          transition: "/Limits/Limit/CreditCard/Zero/New/Other"
                    
Other:
    isNotAuthorized: Для уточнения причин отсутствия кредитного лимита напишите нам в чате «Уралсиб Онлайн».
    Authorized: Для уточнения причин отсутствия кредитного лимита перевожу вас на оператора. Пожалуйста, ожидайте.
                        
Old:
