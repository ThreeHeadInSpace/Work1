Revoke:
  reply:
    - |
      Отменить ошибочный перевод по номеру карты или через СБП невозможно. Чтобы вернуть средства, обратитесь к получателю перевода.
      Если перевод был оформлен некорректно, деньги вернутся на ваш счёт автоматически в течение шести рабочих дней.
      В офисе банка можно отменить следующие операции при предъявлении паспорта:
      •	ошибки при снятии или внесении наличных
      •	переводы по реквизитам счёта (услуга платная)
    - |
      Для отмены покупки обратитесь в магазин. Сроки возврата уточняйте в торговой точке. Стандартный срок возврата до 10 календарных дней. 
      При ошибочном платеже за мобильную связь обратитесь в службу поддержки вашего оператора.


Time:
  reply: |
     Сроки перевода по СБП от 15 секунд до 3 минут.
     Переводы по реквизитам и с карты на карту до 3 рабочих дней.
     
Problem:
  reply: По вопросу проблем с переводом переключаю вас на оператора. 

