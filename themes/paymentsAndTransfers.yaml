# Платежи и переводы
MoneyTransfer:
  Reply: Выберите интересующий способ перевода.

  Buttons:
    - text: "По номеру телефона или СБП"
      transition: "/PaymentsAndTransfer/MoneyTransfer/SBP"
    - text: "По номеру карты"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Card2Card"
    - text: "По реквизитам"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites"
    - text: "По системе срочных переводов"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Urgent"

Card2Card:
  isNotAuthorized: 
    - Для перевода по номеру карты в приложении «Уралсиб Онлайн» на главном экране выберите раздел «Платежи» -> «С карты на карту».
  web: 
    - Для перевода по номеру карты на главном экране выберите раздел «Платежи» -> «Перевести» -> «На карту» или пройдите по [ссылке]({{$temp.Card2CardLink}})
  iosOrAndroid: 
    - Для перевода по номеру карты на главном экране выберите раздел «Платежи» -> «С карты на карту» или пройдите по [ссылке]({{$temp.Card2CardLink}})
  Reply: 
    - Ознакомиться с комиссией и лимитами на перевод можно пройдя по [ссылке](https://uralsib.ru/api/directory-engine/files/rates/tarifi-i-limiti_iafynftm.pdf)

SBP:
  isNotAuthorized:
    - Для перевода по номеру телефона в приложении «Уралсиб Онлайн» выберите раздел «Платежи» -> «По номеру телефона».
    - |
     Подключить СБП можно:
     1. Раздел «Еще» -> «Настройки СБП»
     2. «Разрешить переводы через СБП» -> «Выбрать счет для пополнения».
  web:
    - Для перевода по номеру телефона выберите раздел «Платежи» -> «Перевести по телефону».
    - |
     Подключить СБП можно:
     1. Раздел «Еще» или «Настройки» (значок с человечком в правом верхнем углу) -> «Настройки СБП», доступно по [ссылке]({{$temp.SBPLink}})
     2. «Разрешить переводы через СБП» -> «Выбрать счет для пополнения».
  iosOrAndroid:
    - Для перевода по номеру телефона выберите раздел «Платежи» -> «По номеру телефона».
    - | 
     Подключить СБП можно:
     1. Раздел «Еще» -> «Настройки СБП», доступно по [ссылке]({{$temp.SBPLink}})
     2. «Разрешить переводы через СБП» -> «Выбрать счет для пополнения». 
  Reply:
    - Подробнее о самом сервисе можно узнать по [ссылке](https://sbp.nspk.ru/).
  image:
    appjaicp:
      - 1_сбп
      - 2_22_3_SBP_2_2_
    uralsib:
      - 2_22_3_transferonthephonenumber
      - 2_22_3_SBP_2_2_
  Buttons:
    - text: "Комиссии и лимиты по переводу СБП"
      transition: "/Limits/Limit/Transfer/SBP"
    - text: "Подключить или настроить СБП"
      transition: "/MobileAppNavigation/DBONavigation/Settings/PhoneTransfer"

Requisites:
  Reply:
    - Какая информация о переводе по реквизитам вас интересует?

  Buttons:
    - text: "Как совершить перевод?"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Currency"
    - text: "Комиссия за перевод"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Comission"
    - text: "Ограничения на перевод"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Limits"

  Currency:
    Reply:
      - Подскажите, планируете осуществить перевод в рублях?

    Buttons:
      - text: "Да"
        transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Currency/Rub"
      - text: "Нет"
        transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Currency/Another"

    Rub:
      FromLimits:
        - |
         Переводы в рублях по России не ограничены по сумме.
         Переводы за границу:
         • Резиденты РФ могут отправлять деньги без ограничений (кроме недружественных стран)
         • Нерезиденты из дружественных стран — могут отправлять переводы
         • Нерезиденты из недружественных стран — не могут отправлять переводы, за исключением работающих в РФ по трудовому или ГПХ договору с зарплатой на счет в российском банке
      isNotAuthorized: 
        - Для перевода в рублях в приложении «Уралсиб Онлайн», выберите раздел «Платежи» -> «По реквизитам».
      web: 
        - Для перевода в рублях выберите раздел «Платежи» -> «По реквизитам», также доступно по [ссылке]({{$temp.TransferLink}})
      iosOrAndroid: 
        - Для перевода в рублях выберите раздел «Платежи» -> «По реквизитам», также доступно по [ссылке]({{$temp.TransferLink}})

    Another:
      FromLimits:
        - На текущий момент приостановлены внешние и исходящие платежи для клиентов - физических лиц по валютам꞉ доллар США, евро, фунт стерлингов, датская крона, японская йена, шведская крона, канадский доллар, норвежская крона, австралийский доллар, шведский франк.
        - Запрещены переводы в иностранной валюте между резидентами РФ. Возможны переводы в евро и долларах на свой счет или счет ближайшего родственника, открытый в банке Уралсиб.
        - Переводы в иностранной валюте за пределы банка возможны только в китайских юанях на свой счет или для оплаты страховки, услуг и обучения при предъявлении договора. Переводы возможны только на счета китайских банках, обсуживающихся на территории материкового Китая, за исключением Гонконга, Макао и Тайваня.

      NotFromLimits:
        - Перевод в долларах $ (USD) и евро € (EUR) на данный момент можно осуществить только в офисе банка Уралсиб, на свой счет или на счет ближайшего родственника.
Comission: |
     Ознакомиться с комиссией за перевод вы можете в разделе «Денежные переводы» по [ссылке](https://www.uralsib.ru/tarify).
     Важно: переводы кредитных средств со счета кредитной карты не входят в льготный период
     
Urgent:
  Reply:
    - Какая информация о срочных переводах вас интересует?

  Buttons:
    - text: "Отправить перевод"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Urgent/Send"
    - text: "Получить перевод"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Urgent/Receive"

  Send:
    - |
     Чтобы отправить срочный денежный перевод:
     • Покажите паспорт и назовите контактный телефон
     • Назовите страну или пункт выдачи переводов Юнистрим, если перевод адресный
     • Сообщите сумму и валюту перевода
     • Скажите ФИО получателя
     • Подпишите заявление на перевод
     • Внесите сумму перевода и оплатите комиссию (если нужно)

     После этого переводу присвоят контрольный номер. Сообщите его получателю вместе с суммой перевода.

    - |
     Переводы в офисах Уралсиба отправляют и выдают только в рублях. Конвертация происходит по курсу Юнистрим, а получателю деньги выдают в долларах США, евро или валюте страны получения перевода.
     Ознакомиться с тарифами и странами, доступными для перевода, можно по [ссылке](https://uralsib.ru/api/directory-engine/files/rates/unistrim_101023_5_mhlv9v6c.pdf)

  Recieve:
    - |
     Чтобы получить срочный перевод, вам понадобятся контрольный номер перевода и сумма.
     Обратиться за деньгами можно в часы работы пункта, который осуществляет переводы Юнистрим.
     Телефон горячей линии Юнистрим — 8-495-744-55-55

Payments:
  AndroidOrWeb: |
        Для оплаты услуг или ЖКУ: 
        1. На главном экране перейдите в раздел «Платежи»;
        2. В блоке «Оплатить» по [ссылке]({{$temp.CityServiceLink}}) выберите услугу и подтвердите платеж.
        Размер комиссии (при ее наличии) будет указан на экране подтверждения перед выполнением операции.

  Other: |
        Оплатить услуги или ЖКУ можно: 
        • В приложении «Уралсиб Онлайн» 
        • В веб-версии на [сайте](https://online.uralsib.ru/)
        1. На главном экране зайдите в раздел «Платежи» 
        2. В блоке «Оплатить» выберите нужную услугу и подтвердите платеж.
        Размер комиссии (при ее наличии) будет указан на экране подтверждения перед выполнением операции.
  reply:
    - При этом обращаю ваше внимание, что за оплату услуг ЖКУ в «Уралсиб Онлайн» в разделе «По реквизитам» будет взиматься комиссия согласно тарифам банка.
    - |
      Просмотреть доступные лимиты на оплату услуг можно:
      1. Внизу главного экрана раздел «Еще» 
      2. Пролистните страницу вниз до блока «Лимиты, доступные на сегодня»
      Там же можно изменить лимит.
  Buttons:
    - text: "Комиссия за перевод по реквизитам"
      transition: "/PaymentsAndTransfer/MoneyTransfer/Requisites/Comission"
      
Commission: |
    Ознакомиться с комиссией за перевод вы можете в разделе «Денежные переводы» по [ссылке](https://www.uralsib.ru/tarify)
    Важно: переводы кредитных средств со счета кредитной карты не входят в льготный период
    
Common: 
  reply:
    - Какая информацию по переводу вас интересует?

  Buttons:
    - text: "Создать перевод"
      transition: "/PaymentsAndTransfer/MoneyTransfer"
    - text: "Отозвать перевод"
