Status:
    Answer:
        - |
         Если заказывали справку на email и она не пришла, проверьте папку «Спам» на своей почте.
        - |
            Срок изготовления справок: 
            • В день обращения: выписки, справки по закрытым и цессионным кредитам, справки для налоговой
            • Для госслужащих — до 5 рабочих дней
            • Для страховой: платная — до 5 рабочих дней, бесплатная — до 20 рабочих дней
    Buttons:
        - text: Срок уже вышел
          transition: "/Statements/Statements/Status/Expired"
          
