GetCheck:
    Answer: Укажите, какой документ хотите получить
    Buttons:
        - text: Платежное поручение
          transition: "/Statements/GetCheck/PaymentOrder"
        - text: Чек по операции
          transition: "/Statements/GetCheck/Receipt"
        - text: Не получается скачать чек
          transition: "/Statements/GetCheck/Problem"
          
PaymentOrder: 
    Answer: 
        - |
          Получить копию платежного поручения с печатью можно в любом отделении банка с паспортом. 
          Справка предоставляется бесплатно в день обращения.
    Buttons:
        - text: Подобрать офис Уралсиб
          transition: "/AddressesUralsib/ATMOrOffice/Office"
         
Receipt:
    NotAuthorized: |
        Получить квитанцию или чек по операции можно:
        • В приложении «Уралсиб Онлайн»
        • [Веб-версии](https://online.uralsib.ru/) 
        Для этого: 
        1. Откройте раздел «История»
        2. Выберите нужную операцию
        3. Убедитесь, что операция подтверждена (значок часов исчез). Чек или квитанцию можно получить только после фактического списания суммы со счета.
        4. Нажмите «Открыть квитанцию» или «Открыть документ»
    Authorized: |
        Для получения квитанции или чека по операции:
        1. Откройте раздел «История»
        2. Выберите нужную операцию
        3. Убедитесь, что операция подтверждена (значок часов исчез). Чек или квитанцию можно получить только после фактического списания суммы со счета.
        4. Нажмите «Открыть квитанцию» или «Открыть документ»
    Final: Квитанцию можно выгрузить в PDF формате, отправить письмом на электронную почту и распечатать чек.
    
Problem:
    Answer: 
        - |
          Скачать чек невозможно в двух случаях:
          1. Операция ещё обрабатывается (значок часов рядом с ней не исчез)
        - |
          2. Это зачисление денег на карту
          Чтобы получить чек о зачислении, обратитесь в любое отделение банка с паспортом.
    Buttons:
        - text: Подобрать офис Уралсиб
          transition: "/AddressesUralsib/ATMOrOffice/Office"
