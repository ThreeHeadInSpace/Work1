# СМС
SMSNotifications: Услуга «Сервис уведомлений» позволяет вам получать информацию об операциях по вашей карте на мобильный телефон,
    тем самым всегда контролировать их и уберечь себя от мошеннических действий.

SMSPrice:
  ManyCards: Выберите карту для просмотра комиссии за уведомления.

  NotAuthorized:
    - Услуга «Сервис уведомлений» предоставляется бесплатно для пакетов услуг «Старт», «Премиум» и «Private Banking».
    - |
        Без пакета услуга:
          • В течение первого месяца — бесплатно
          • Со второго месяца — 129 рублей в месяц. Комиссия списывается каждый месяц в день подключения услуги — это предоплата за следующий месяц

  InactiveAPI:
    - Услуга «Сервис уведомлений» предоставляется бесплатно для пакетов услуг «Старт», «Премиум» и «Private Banking».
    - |
     Без пакета услуга:
      • Первый месяц предоставляется бесплатно
      • Со второго месяца — 129 рублей в месяц. Комиссия за предоставление услуги списывается ежемесячно в дату подключения услуги путем предоплаты за последующий месяц
Sum:
  - "Стоимость услуги «Сервис уведомлений» составляет {{$temp.rubleForm}}"
  - |
    В течение первого месяца - без комиссии.

    Со второго месяца комиссия списывается ежемесячно в день подключения услуги — это предоплата за следующий месяц.

Error: Для продолжения консультации переключаю вас на оператора.

SMSOn:
  ManyCards: Выберите карту для проверки подключения уведомлений.

  NoCards: У вас нет активных карт, для которых можно было бы подключить услугу «Сервис уведомлений».

  NotAuthorized: |
    Подключить уведомления можно:
     1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online): на главной странице выберите нужный продукт -> «О карте».
     2. В чате «Уралсиб Онлайн».
     3. В банкоматах банка в разделе «О карте».
     4. По номеру горячей линии — 8-800-250-57-57.
     
  InactiveAPI: |
    Подключить уведомления можно:
     1. В «Уралсиб Онлайн»: на главной странице выберите нужный продукт -> «О карте».
     2. В банкоматах банка в разделе «О карте».
     3. По номеру горячей линии — 8-800-250-57-57

Check:
  Active: "{{ $session.name }}, к карте *{{$session.usersTargetCard.pan}} уже подключена услуга «Сервис уведомлений» на номер {{$session.usersTargetCard.smsPhone}}."

  Inactive:
    - "Стоимость услуги «Сервис уведомлений» составляет {{$temp.rubleForm}}."
    - "Хотите подключить услугу?"

  Error: Для продолжения консультации переключаю вас на оператора.

  Number: На какой номер подключить уведомления?

  Confirm: "«Сервис уведомлений» подключен на номер {{ $session.phoneNumber }}. Услуга будет активна в течение 8 часов."

  Another:
    - Подключение услуги доступно только на номер, сохраненный в системе банка.
    - |
        Сменить номер телефона можно:
        • Через банкомат Уралсиб в разделе «Сервис уведомлений»
        • В отделении банка в рамках филиала, выпустившего карту

  Buttons:
    - text: "Да"
      transition: "/SMSNotifications/SMSOn/Check/Number"
    - text: "Нет"
      transition: "/SomethingElse"
   
SMSOff:   
  web: |
    Для отключения уведомлений по операциям:
      1. На главном экране выберите нужную карту.
      2. Внизу страницы «Сервисы».
  iosOrAndroid: |
    Для отключения уведомлений по операциям:
      1. На главном экране выберите нужную карту.
      2. Далее «Управление» -> «Сервис уведомлений».
  isNotAuthorized: |
    Отключить уведомления по операциям можно:
      1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online) выберите карту -> «Управление» -> «Сервис уведомлений».
      2. В [веб-версии на сайте](https://online.uralsib.ru) выберите карту, затем внизу страницы «Сервисы».
      3. В [банкомате Уралсиба]({{$temp.ATMLink}})
      4. В [офисе банка]({{$temp.OfficeLink}}) при себе нужно иметь паспорт.
