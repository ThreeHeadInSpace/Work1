# Кредитные карты
CreditCard:
  FirstAnswers:
    - Готов проконсультировать вас по вопросам, связанным с оформлением кредитных карт банка Уралсиб.
    - С удовольствием расскажу вам об оформлении кредитных карт банка Уралсиб.

  SecondAnswers:
    - Уточните, какая операция вам требуется?
    - Выберите интересующую вас операцию.

  buttons:
    - text: "Оформить заявку"
      transition: "/CreditCards/CreditCard/Request"
    - text: "Ознакомиться с условиями"
      transition: "/CreditCards/CreditCard/Conditions"

Conditions:
  Answer: |
    Требования к заемщику для оформления кредитной карты꞉
      • Гражданство РФ с постоянной регистрацией на территории РФ
      • Возраст от 20 до 67 лет на момент погашения кредита (при наличии одобренного предложения — до 75 лет)
      • Официальное трудоустройство более 3 месяцев или срок регистрации ИП более 1 года

    Подскажите, вы подходите под требования?

  buttons:
    - text: "Да"
      transition: "/CreditCards/CreditCard/Conditions/Agree"
    - text: "Нет"
      transition: "/CreditCards/CreditCard/Conditions/Disagree"

  Disagree_Authorized: |
     В таком случае вам может быть отказано в оформлении кредитной карты.

     Подробные условия вы сможете найти в этом разделе꞉ {{$temp.CreditCardLink}}

  Disagree_Unauthorized: |
     В таком случае вам может быть отказано в оформлении кредитной карты.

     Более подробные условия и ответы на часто задаваемые вопросы вы сможете найти на [нашем сайте]({{$temp.CreditCardLink}})

AskCardType:
  Answer:
    - Уточните, какая кредитная карта вас интересует?

  buttons:
    - text: "Карта 120 дней без процентов"
      transition: "/CreditCards/CreditCard/AskCardType/120Days"
    - text: "Карта с кэшбеком на покупки"
      transition: "/CreditCards/CreditCard/AskCardType/Cashback"
    - text: "Другое"
      transition: "/CreditCards/CreditCard/AskCardType/Other"

  120days_fromConditions: |
      Для кредитной карты «120 дней на максимум» размер процентной ставки определяется банком индивидуально в диапазоне {{$temp.tariff.RateRange}} Узнать точную ставку возможно после подачи заявки.
      Обслуживание карты бесплатно при тратах {{$temp.tariff.CardServiceFee}} в месяц.
      Комиссия за снятие наличных в банкоматах банка Уралсиб — {{$temp.tariff.CashWithdrawalFeeUralsib}}
      Комиссия за снятие наличных в банкоматах других банков — {{$temp.tariff.CashWithdrawalFeeOther}}
      Льготный период составляет {{$temp.tariff.GracePeriod}}

  120days: |
      Оформить заявку на кредитную карту «120 дней на максимум» можно по [ссылке]({{$temp.CC120DaysLink}})
      Также отправляю вам ссылку на подробный [тарифный план](https://uralsib.ru/api/directory-engine/files/rates/120dney_010626_biit7jme.pdf)

  Cashback_fromConditions: |
      Для кредитной карты «Карта с кэшбеком» размер процентной ставки определяется банком индивидуально в диапазоне {{$temp.tariff.RateRange}} . Узнать точную ставку возможно после подачи заявки.
      Обслуживание карты бесплатно при тратах {{$temp.tariff.CardServiceFee}} в месяц.
      Комиссия за снятие наличных в банкоматах банка Уралсиб — {{$temp.tariff.CashWithdrawalFeeUralsib}}
      Комиссия за снятие наличных в банкоматах других банков — {{$temp.tariff.CashWithdrawalFeeOther}}
      Льготный период составляет {{$temp.tariff.GracePeriod}}

      Также вам будет доступно основное преимущество — участие в программе лояльности «Уралсиб Бонус» с кешбэком за оплату картой.

  Cashback:
    - |
      Оформить заявку на кредитную карту «Карта с кэшбеком» можно по [ссылке]({{$temp.CCCashbackLink}})
      Также отправляю вам ссылку на подробный [тарифный план](https://uralsib.ru/api/directory-engine/files/rates/credcard_010626_tekfys6v.pdf)
  Other:
    - Ознакомиться с полным списком кредитных карт и условиями их оформления, а также оставить заявку на получение карты вы сможете по [ссылке]({{$temp.CreditCardLink}})
    
SumDateInfo:
    isNotAuthorized:
       - |
        Узнать сумму и дату платежа по кредитной карте: 
        • В приложении «Уралсиб Онлайн» на главной странице выберите кредитную карту. На виджете будет отображаться информация о сумме и дате платежа, а также общая сумма долга. Если имеется просроченная задолженность, информация по ней также будет указана.
       - |
        • В веб-версии на [сайте](https://online.uralsib.ru/) на главной странице в разделе «Кредитная карта» будет отображаться информация о сумме и дате платежа. 
    web: |
      На главной странице в разделе "Кредитная карта" будет отображаться информация о сумме и дате платежа, а также общая сумма долга.
    iosOrAndroid: |
      На главной странице выберите кредитную карту. На виджете будет отображаться информация о сумме и дате платежа, а также общая сумма долга. Если имеется просроченная задолженность, информация по ней также будет указана. 

GracePeriod:
  Answer: Понимаю, что ваше обращение связано с льготным периодом. Чтобы я мог дать ответ, уточните, какая информация вам требуется?

  buttons:
    - text: "Срок льготного периода"
      transition: "/CreditCards/CreditCard/GracePeriod/Info"
    - text: "Операции для льготного периода"
      transition: "/CreditCards/CreditCard/GracePeriod/Operation" 
    - text: "Несогласие с льготным периодом"
      transition: "/CreditCards/CreditCard/GracePeriod/Disagree"  
    - text: "Условия"
      transition: "/CreditCards/CreditCard/GracePeriod/Conditions"  

  Info:
     - |
      На главном экране выберите нужную карту. 
      Вы увидите:
      • доступный баланс
      • сумму задолженности
      • срок льготного периода

  Operation: 
    - |
     В льготный период входят:
     · Покупки по карте или с использованием реквизитов карты
     · Операции по оплате через «Уралсиб Онлайн» в разделе «Платежи»
     При оплате услуг ЖКХ через личный кабинет по QR-коду проверьте наличие комиссии, при отсутствии комиссии операция войдет в льготный период.
    - |
     В льготный период не входят:
     · Операции по переводам и снятию наличных
     · Оплата по QR-коду в торговых точках
    - |
     С полным списком операций, не входящих в льготный период, можно ознакомиться на сайте банка: выберите кредитную карту -> «Узнать о карте» -> «Тарифы и документы». В «Документах» откройте файл «Перечень кодов МСС Квази-кэш».

  Disagree:
     - |
      Чтобы уточнить все детали по льготному периоду, я переведу вас на оператора.
      
ConditionsGrace:
  Answer: Уточните, условия льготного периода по какой карте вас интересуют?

  buttons:
    - text: "Карта 120 дней без процентов"
      transition: "/CreditCards/CreditCard/GracePeriod/Conditions/120Days"
    - text: "Карта с кэшбеком на покупки"
      transition: "/CreditCards/CreditCard/GracePeriod/Conditions/Cashback" 
      
Days120:
  reply: 
     - |
      Деньги за покупки, сделанные по карте «120 дней на максимум» в первые 3 месяца после начала льготного периода нужно вернуть в конце 4 месяца. Первого числа, четвертого месяца льготный период обнуляется и начнется с первой покупки до 120 дней. 
      Подробнее о льготном периоде можно прочитать на [сайте](https://uralsib.ru/kreditnye-karty/120-dney)
  image:
      appjaicp:  
        - Grace120d
      uralsib:
        - Grace120d

Cashback: 
  reply:
    - |
     Покупки, которые вы делаете по «Карте с кэшбеком» в первый месяц, нужно оплатить в течение следующего месяца. Первого числа следующего месяца льготный период обнуляется и начнется с первой покупки на 62 дня. 
     Подробнее о льготном периоде можно прочитать на [сайте](https://uralsib.ru/kreditnye-karty/120-dney)  
  image:
      appjaicp:  
        - GraceCash
      uralsib:
        - GraceCash    
     
