Refusal:
    Answer: 
        - Уточните, пожалуйста, от чего именно хотите отказаться?
        - Отказ от чего именно вас интересует?
    Buttons: 
        - text: "Отказаться от заявки на кредит"
          transition: "/Refusal/Refusal/CreditRequest"
        - text: "Отказаться от предложений банка"
          transition: "/Refusal/Refusal/Ads"
        - text: "Другое"
          transition: "/Refusal/Refusal/Other"
      
ToOperator: Для продолжения консультации переключаю вас на оператора.

Ads:
    Authorized: 
        Answer: Банк присылает уведомления о выгодных предложениях, которые доступны только вам. Подскажите, вы точно хотите от них отказаться? 
        Buttons:
                - text: "Да"
                  transition: "/Refusal/Refusal/Ads/Agree"
                - text: "Нет"
                  transition: "/Refusal/Refusal/Ads/Disagree"

    Agree: Я зарегистрировал заявку на  исключение из рассылок. Исключение займет до 7 дней, поэтому сообщения от банка могут приходить еще некоторое время.
    
    Disagree: 
        - Рад вашему решению! Для вас — только лучшие предложения.
        - Отличное решение! Уверен, предложения вас заинтересуют.