# Обновление паспортных данных
UpdatePassportData:
    isNotAuthorized: При смене паспорта нужно обновить информацию в банке. Вы можете актуализировать данные через «Уралсиб Онлайн» или в [веб-версии](https://online.uralsib.ru/) , используя авторизацию через Госуслуги, либо в [офисе банка]({{$temp.officeLink}})
    Mobile:
        reply: Для обновления паспортных данных перейдите в раздел «Еще» - «Мои данные» - «Паспорт» - выберите «Обновить» - далее «Обновить через Госуслуги».
