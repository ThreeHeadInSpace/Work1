# Страхование
Insurance:
    reply: Какой у вас вопрос по страхованию?
    buttons: 
        - text: Оформить
          transition: "/Insurance/Insurance/Request"
        - text: Продлить
          transition: "/Insurance/Insurance/Prolongation"
        - text: Статус рассмотрения документов
          transition: "/Insurance/Insurance/DocChecking"
        - text: Сообщить о страховом случае
          transition: "/Insurance/Insurance/InsuredEvent"
        - text: Отказаться от страхования
          transition: "/Insurance/Insurance/Return"
        - text: Страхование займа МКК «Уралсиб Финанс»
          transition: "/Insurance/Insurance/Microloan"
        - text: Информация о текущем договоре
          transition: "/Insurance/Insurance/Info"
          
Request:
    reply: Какой вид страхования желаете оформить?
    buttons: 
        - text: Ипотека
          transition: "/Insurance/Insurance/Request/Mortgage"
        - text: Автокредит
          transition: "/Insurance/Insurance/Request/CarLoan"
        - text: Кредитная карта
          transition: "/Insurance/Insurance/Request/CreditCard"
        - text: Другой вид страхования
          transition: "/Insurance/Insurance/Request/Other"
        - text: ВЗР (Полис выезжающих за рубеж)
          transition: "/Insurance/Insurance/Request/VZR"
          
RequestMortgage:
    reply: 
        - |
          Оформить ипотечное страхование можно в аккредитованных банком компаниях.
          Список компаний доступен по [ссылке](https://uralsib.ru/ipoteka/strakhovanie)
        - |
          Квитанцию об оплате, договор страхования и график оплаты страховых взносов можно предоставить на электронную почту: kk@uralsibbank.ru (в теме письма укажите ФИО заемщика и номер договора. После принятия документов в работу вы получите уведомление на электронную почту).
          Срок рассмотрения — до 10 рабочих дней.
          
RequestCarLoan:
    reply:
        - |
          Оформить страхование автокредита можно в аккредитованных банком компаниях.
          Список компаний доступен по [ссылке](https://www.uralsib.ru/legal/strakhovie-kompanii) (раздел «Автокредиты»).
        - |
          Квитанцию об оплате, договор страхования и график оплаты страховых взносов можно предоставить на электронную почту: kk@uralsibbank.ru (в теме письма укажите ФИО заемщика и номер договора. После принятия документов в работу вы получите уведомление на электронную почту).
          Срок рассмотрения — до 10 рабочих дней.

RequestCreditCard:
    isNotAuthorized:
        - |
          Подключить услугу страхования жизни и здоровья держателей кредитных карт «Моя защита» можно в «Уралсиб Онлайн» и в [офисе банка](OfficeLink), при себе нужно иметь паспорт.
    web:
        - |
          Для подключения услуги страхования жизни и здоровья держателей кредитных карт «Моя защита»:
          1. На главном экране выберете нужную карту - вкладка «Сервисы».
          2. Нажмите на «Моя защита» и выберите «Подключить».
    iosOrAndroid:
        - |
          Для подключения услуги страхования жизни и здоровья держателей кредитных карт «Моя защита»:
          1. На главном экране выберите нужную карту - вкладка «Управление».
          2. Далее «Сервисы» - «Моя защита» - «Подключить».
    final:
        - |
          Стоимость — 1,39% в месяц (но не менее 99 рублей) от максимальной суммы задолженности в календарном месяце, предшествующем периоду страхования.
          Более подробно ознакомиться с условиями можно по [ссылке](https://uralsib.ru/strakhovanie/kreditnaya-karta)
          
RequestOther:
    reply: 
        - |
          Ознакомиться с условиями страхования и подобрать подходящий продукт можно на [сайте](https://uralsib.ru/strakhovanie)
          
RequestVZR:
    reply: 
        - |
          Полис ВЗР доступен в рамках премиального пакета услуг. Для более подробной консультации перевожу вас на оператора.
          
Prolongation:
    reply: По какому продукту желаете продлить страхование?
    buttons: 
        - text: Ипотека
          transition: "/Insurance/Insurance/Prolongation/Mortgage"
        - text: Автокредит
          transition: "/Insurance/Insurance/Prolongation/CarLoan"
          
ProlongationMortgage:
    reply:
        - |
          Продлить договор можно в любой страховой компании из [списка](https://uralsib.ru/ipoteka/strakhovanie)
        - |
          Для пролонгации договора заблаговременно обратитесь в страховую компанию и сообщите менеджеру остаток долга по кредиту.
          Если вы не успели пролонгировать договор страхования в установленный срок, необходимо будет заключить новый и предоставить подтверждающие документы в банк.
          Оплатите страховой взнос и направьте квитанцию по адресу: kk@uralsibbank.ru (в теме письма укажите ФИО заемщика и № кредитного договора).
          Срок рассмотрения — до 10 рабочих дней.
        - |
          В случае заключения дополнительного соглашения к договору ипотечного страхования или заключения нового договора с изменением страховой компании необходимо направлять сканы таких документов и график оплаты страховых взносов вместе с квитанцией об оплате.
          
ProlongationCarLoan:
    reply:
        - |
          Продлить КАСКО можно в любой страховой компании из [списка](https://www.uralsib.ru/legal/strakhovie-kompanii)
        - |
          Копии документов, подтверждающих оплату, можно предоставить на электронную почту: kk@uralsibbank.ru (в теме письма укажите ФИО заемщика и № кредитного договора).
          При заключении нового договора направьте полный пакет документов: квитанцию об оплате, договор страхования и график оплаты страховых взносов.
          Срок рассмотрения — до 10 рабочих дней.
          
DocChecking:
    reply:
        - |
          Когда документы, направленные на электронную почту kk@uralsibbank.ru, будут приняты в работу, на вашу электронную почту придет уведомление.
          Срок рассмотрения документов — до 10 рабочих дней.
          
InsuredEvent:
    reply: Подскажите, по какому продукту оформляли страхование?
    buttons: 
        - text: Кредитная карта
          transition: "/Insurance/Insurance/InsuredEvent/CreditCard"
        - text: Кредит
          transition: "/Insurance/Insurance/InsuredEvent/Loan"
          
InsuredEventCreditCard:
    reply:
        - |
          При наступлении страхового случая по услуге «Моя защита» нужно:
          1. Уведомить страховую компанию любым удобным способом в течение 30 календарных дней.
          2. Заполнить анкету, заявление, получить в банке справку о размере задолженности по кредитному договору и направить сканы по адресу, который предоставит страховая компания. 
          3. После рассмотрения заявления страховая компания предоставит ответ.
InsuredEventLoan:
    reply:
        - |
          При возникновении страхового случая обратитесь в страховую компанию, с которой заключен договор.
          Если не помните название страховой компании, напишите «Оператор» и я соединю вас со специалистом, который все подскажет.
          
Return:
    reply: Понял, что ваш вопрос связан с возвратом страхования. Страхование какого продукта оформляли?
    buttons: 
        - text: Кредитная карта
          transition: "/Insurance/Insurance/Return/CreditCard"
        - text: Ипотека
          transition: "/Insurance/Insurance/Return/Mortgage"
        - text: Автокредит
          transition: "/Insurance/Insurance/Return/CarLoan"
        - text: Потребительский кредит
          transition: "/Insurance/Insurance/Return/ConsumerLoan"
        - text: Кредит, оформленный в магазине
          transition: "/Insurance/Insurance/Return/POS"
          
ReturnCreditCard:
    isNotAuthorized:
        - |
          Отключить услугу «Моя защита» можно:
          1. Самостоятельно в «Уралсиб Онлайн».
          2. Позвонив на номер 8-800-250-57-57 или написав в чат «Уралсиб Онлайн». 
          3. В [офисе банка](OfficeLink), при себе нужно иметь паспорт.
    web:
        - |
          Для отключения услуги «Моя защита»:
          1. На главном экране выберите нужную карту - вкладка «Сервисы».
          2. Нажмите на «Моя защита» и выберите «Отключить».
    iosOrAndroid:
        - |
          Для отключения услуги «Моя защита»:
          1. На главном экране выберите нужную карту - вкладка «Управление».
          2. Далее «Сервисы» - «Моя защита» - «Отключить»
    final:
        - |
          Вернуть полную сумму страхования можно в период охлаждения (до 30 календарных дней по договорам, оформленным с 21.01.2024). 
          После окончания данного срока доступен частичный возврат.
          
ReturnMortgage:
    reply: Понял, что вопрос связан с возвратом страхования по ипотеке. Подскажите, какой вид страхования оформляли?
    buttons: 
        - text: Страхование недвижимости
          transition: "/Insurance/Insurance/Return/Mortgage/Estate"
        - text: Страхование жизни и рисков потери трудоспособности
          transition: "/Insurance/Insurance/Return/Mortgage/Life"
        - text: Страхование титула
          transition: "/Insurance/Insurance/Return/Mortgage/Title"
        - text: Коробочное страхование
          transition: "/Insurance/Insurance/Return/Mortgage/Box"
          

ReturnMortgageEstate:
    reply:
        - |
          Страхование залога от рисков повреждения и уничтожения - это обязательный вид страхования, который заключается на весь срок кредитования. 
          Отказаться от данного вида страхования нельзя.
          
ReturnMortgageLife:
    reply:
        - |
          При отказе от страхования жизни и рисков потери трудоспособности ставка по ипотеке может быть увеличена. 
          С условиями возврата можно ознакомиться в страховой компании, где был заключен договор.
          
ReturnMortgageTitle:
    reply:
        - |
          При отказе от страхования титула (первые 3 года) ставка по ипотеке может быть увеличена.
          По вопросам возврата обратитесь в страховую компанию, с которой был заключен договор.
          
ReturnMortgageBox:
    reply:
        - |
          По вопросам возврата коробочного страхования обратитесь в страховую компанию, с которой был заключен договор. 
          
ReturnCarLoan:
    reply: Понял, что вопрос связан с возвратом страхования по автокредиту. Подскажите, какой вид страхования оформляли?
    buttons: 
        - text: ОСАГО
          transition: "/Insurance/Insurance/Return/CarLoan/Osago"
        - text: КАСКО
          transition: "/Insurance/Insurance/Return/CarLoan/Casko"
        - text: Дополнительные услуги от партнеров
          transition: "/Insurance/Insurance/Return/CarLoan/Additional"
          
ReturnCarLoanOsago:
    reply:
        - |
          Полис ОСАГО – это обязательное страхование гражданской ответственности владельцев автомобиля и отказаться от него нельзя.
          
ReturnCarLoanCasko:
    reply:
        - |
          Для уточнения возможности и условий возврата обратитесь в вашу страховую компанию. Название компании можно посмотреть в договоре страхования.
          
ReturnCarLoanAdditional:
    reply:
        - |
          Для отказа от дополнительных услуг от партнеров:
          1. Подайте заявление об отказе поставщику услуг в период охлаждения. 
          2. Заполните в отделении банка заявление по форме банка и приложите заявление, направленное поставщику услуг.
          
ReturnConsumerLoan:
    reply:
        - |
          Вернуть страховку можно:
          1. В «период охлаждения» (30 календарных дней с даты оформления кредита). Процентная ставка может быть увеличена.
          2. При полном досрочном погашении. Для кредитов, оформленных после 01.08.2022, возврат возможен только в первые два года с даты оформления кредита.
        - |
          Для консультации по возврату в период охлаждения позвоните по номеру 8-495-723-77-28 в будние дни с 09:00 до 17:00 по МСК.
          Для возврата неиспользованной части страховой премии, после полного досрочного погашения, обратитесь в [офис банка](OfficeLink) с заявлением.
          
ReturnPOS:
    reply:
        - |
          Для отказа от услуги страхования обратитесь в вашу страховую компанию.
          Название компании и данные для связи можно уточнить в договоре, который был отправлен на ваш email.
        - |
          Если у вас оформлена услуга «Моя защита +» — отказаться от нее можно в «период охлаждения» (30 календарных дней с момента подписания заявления о предоставлении услуги).
          
Microloan:
    reply:
        - |
          Если при получении займа вы заключили договор страхования и у вас возникли вопросы, обратитесь в страховую компанию, указанную в договоре.
          
Info:
    reply:
        - |
          Для уточнения информации по текущему договору обратитесь в вашу страховую компанию.
          Если не помните название страховой компании, напишите «Оператор» и я соединю вас со специалистом, который все подскажет.
   


   
    