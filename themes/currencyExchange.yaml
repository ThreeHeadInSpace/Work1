# Курс валют
CurrencyExchange:
  - |
    В банке Уралсиб можно обменять следующие валюты:
    • Доллар $ ↔ Рубль ₽
    • Евро € ↔ Рубль ₽
    • Доллар $ ↔ Евро €
    • Юань ¥ ↔ Рубль ₽
  - Уточнить актуальный курс можно по [ссылке](https://www.uralsib.ru/kursy-valyut)
  - Комиссия за обмен валюты не взимается. Банк может корректировать курс в течение дня. Уточнить наличие и количество нужной валюты можно только при личном обращении в отделение банка. 
