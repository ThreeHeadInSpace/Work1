#Проблемы
Trouble: 
  answer:
  - |
    Я понял, что у вас возникла проблема. Чтобы я мог дать ответ, уточните, с чем вы столкнулись?
  buttons:
    - text: "Оформление кредита"
      transition: "/Trouble/Trouble/Loan"
    - text: "Кнопка"
      transition: "/Trouble/Trouble/Button"
