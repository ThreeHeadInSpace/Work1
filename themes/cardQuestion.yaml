# Вопросы по картам
Common:
  reply: 
      - Ваш вопрос связан с дебетовой или кредитной картой?
  buttons: 
      - text: Дебетовая карта
        transition: "/CardQuestion/Common/DebitCard"
      - text: Кредитная карта
        transition: "/CardQuestion/Common/CreditCard"

