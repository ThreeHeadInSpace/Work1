          transition: "/CreditCards/CreditCard/Request"
        - text: "Сумма и дата платежа"
          transition: "/CreditCards/CreditCard/SumDateInfo"
        - text: "Срок льготного периода"
          transition: "/CreditCards/CreditCard/GracePeriod"
        - text: "Способы пополнения"
          transition: "/MobileAppNavigation/DBONavigation/ManageCards/TopUp"
        - text: "Заблокировать"
          transition: "/MobileAppNavigation/DBONavigation/ManageCards/Block"
        - text: "Разблокировать"
          transition: "/MobileAppNavigation/DBONavigation/ManageCards/Unblock"
        - text: "Посмотреть реквизиты"
          transition: "/MobileAppNavigation/DBONavigation/ManageCards/Details"
        - text: "Узнать о готовности"
          transition: "/CardQuestion/Common/Ready"

DebitCard:
