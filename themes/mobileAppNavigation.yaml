PasswordChange:
  start: Если суммарный баланс всех банковских продуктов от 100 тысяч рублей, то сброс пароля не сработает - для смены пароля обратитесь по номеру 8-800-250-57-57 или в офис.
  isNotAuthorized: 
    - |
     Для смены пароля при балансе до 100 тысяч рублей:
     • В приложении «Уралсиб Онлайн»
     • В [веб-версии](https://online.uralsib.ru/)
     Для этого в разделе «Ещё» выберите «Вход в приложение».
    - |
     Если забыли пароль восстановить его можно:
     1. На странице для входа в личный кабинет выберите «Напомнить пароль»
     2. Введите номер телефона или карты, нажмите «Продолжить»
     3. Следуйте инструкции на экране 
  isAuthorized: 
    - |
     Для смены пароля при балансе до 100 тысяч рублей:
     На главном экране зайдите в раздел «Ещё»
     1. Найдите раздел «Вход в приложение»
     2. Нажмите на «Изменить пароль»
    - |
     Если забыли текущий пароль:
     1. Выйдите из личного кабинета по кнопке «Выйти» при входе в приложение
     2. На странице для входа выберите «Напомнить пароль»
     3. Введите номер счета или карты, нажмите «Продолжить»
  web: 
    - |
     Для смены пароля при балансе до 100 тысяч рублей:
     1. На главной странице нажмите на значок человека в правом верхнем углу
     2. Найдите раздел «Вход в приложение» → «Пароль»
     3. Нажмите «Изменить»
    - |
     Если забыли пароль восстановить его можно:
     1. На странице для входа выберите «Напомнить пароль»
     2. Введите номер счета или карты, нажмите «Продолжить»
     3. Следуйте инструкции на экране
  final: В целях безопасности пароль необходимо менять каждые 12 месяцев.
  
SBPAccountChange:
