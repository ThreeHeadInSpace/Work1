ManageCardsTopUp:
  isAuthorized:
    web: |
      Пополнить карту можно:
          • Со своего счета в Уралсибе
          • Из другого банка по номеру карты
          • Из другого банка по СБП
    
        Для этого:
        1. На главном экране в разделе «Карты» выберите нужную карту
        2. Нажмите на кнопку «Пополнить карту»
    reply: Пополнить карту возможно со своего счета в Уралсибе, из другого банка или по номеру карты.
    question: Какую карту будете пополнять?
  isNotAuthorized:
    reply: |
        Пополнить карту можно:
          • Со своего счета в Уралсибе
          • Из другого банка по номеру карты
          • Из другого банка по СБП
    
        Для этого откройте интересующую карту и выберите «Пополнить».
  image:
    appjaicp: 3_22_3_пополнить карту
    uralsib: 3_22_3_replenish_card

ManageCardsTopUpLink: Вы можете пополнить вашу карту по [ссылке]({{$temp.DBOCardTopUpLink}})

ManageCardsStatement:
  isAuthorized:
    iosOrAndroid: |
        Для оформления выписки или справки:
        1. Выберите нужный продукт на главном экране.
        2. Нажмите на кнопку «Управление» -> «Выписка и справки». 
        3. Выберите необходимую справку, заполните поля.
        После оформления документы будут направлены на ваш электронный адрес.
    question: Для заказа выписки выберите нужную карту. После получения выписка будет направлена на вашу электронную почту.
  isNotAuthorized: |
    Заказать справку или выписку можно:
      1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online) : выберите продукт -> «Управление» -> «Выписка и справки».
      2. В [веб-версии на сайте](https://online.uralsib.ru) : на главной странице выберите продукт, внизу страницы «Действия» -> «Выписка и справки».
      3. В [офисе банка]({{$temp.OfficeLink}}) при себе нужно иметь паспорт.
  image:
    appjaicp: 3_22_3_Выписка и справки
    uralsib: 3_22_3_ordering_and_reference

ManageCardsStatementLink: Заказать выписку по вашей карте можно по [ссылке]({{$temp.DBOCardStatementLink}})

ManageCardsBlock:
  web: |
    Для блокировки карты:
      1. Выберите нужную карту на главном экране.
      2. Внизу страницы «Действия» -> «Заблокировать».
  iosOrAndroid: |
    Для блокировки карты:
      1. Выберите нужную карту на главном экране.
      2. Далее «Управление» -> «Заблокировать».
  isNotAuthorized: |
    Заблокировать карту можно:
      1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online) : выберите карту -> «Управление» -> «Заблокировать».
      2. В [веб-версии на сайте](https://online.uralsib.ru) : на главной странице выберите карту, внизу страницы «Действия» -> «Заблокировать».
      3. По номеру горячей линии 8-800-250-57-57.
      4. В [офисе банка]({{$temp.OfficeLink}}) при себе нужно иметь паспорт.
  image:
    appjaicp: 3_22_3_блокировка карты
    uralsib: 3_22_3_block_card

ManageCardsUnblock:
  web: |
    Для разблокировки карты:
      1. Выберите нужную карту на главном экране.
      2. Внизу страницы «Действия» -> «Разблокировать».
    Если у вас нет кнопки «Разблокировать», напишите «Оператор». Я свяжу вас с сотрудником, чтобы уточнить возможность разблокировки карты.
  iosOrAndroid: |
    Для разблокировки карты:
      1. Выберите нужную карту на главном экране.
      2. Далее «Управление» -> «Разблокировать».
    Если у вас нет кнопки «Разблокировать», напишите «Оператор». Я свяжу вас с сотрудником, чтобы уточнить возможность разблокировки карты.
  isNotAuthorized: |
    Разблокировать карту можно:
      1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online): выберите карту -> «Управление» -> «Разблокировать».
      2. В [веб-версии на сайте](https://online.uralsib.ru) : на главной странице выберите карту, внизу страницы «Действия» -> «Разблокировать».
      3. По номеру горячей линии 8-800-250-57-57.
      4. В [офисе банка]({{$temp.OfficeLink}}) при себе нужно иметь паспорт.
  image:
    appjaicp: 2_22_3_разблокировать карту
    uralsib: 2_22_3_unblock_card

ManageCardsChangePIN:
  isNotAuthorized:
    - |
        Получить или сменить ПИН-код можно:
          1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online): выберите карту -> «Управление» -> «Изменить ПИН-код».
          2. В [веб-версии на сайте](https://online.uralsib.ru): на главной странице выберите карту, внизу страницы «Действия» -> «Изменить ПИН-код».
          3. В [банкомате Уралсиба]({{$temp.ATMLink}}) Для этого нужно ввести действующий ПИН-код.
    - Если карта выдавалась с ПИН-конвертом, то изменить ПИН-код можно только в [банкомате Уралсиба]({{$temp.ATMLink}}) Для этого нужно ввести действующий ПИН-код. Если забыли ПИН-код, вам потребуется перевыпуск карты.
  image:
    appjaicp: 3_22_3_Изменить PIN-код
    uralsib: 3_22_3_change_PIN

ManageCardsAnalytics:
  isAuthorized:
    reply: Аналитика расходов показывает все ваши операции, разделённые по категориям в зависимости от кода операции (МСС). Если нажать на категорию, то можно увидеть все платежи в ней. Вы можете выбрать карты, валюту и период времени для анализа с помощью фильтрации.
    question: По какой карте интересует аналитика?
  isNotAuthorized:
    reply:
      - Аналитика расходов показывает все ваши операции, разделённые по категориям в зависимости от кода операции (МСС). Если нажать на категорию, то можно увидеть все платежи в ней. Вы можете выбрать карты, валюту и период времени для анализа с помощью фильтрации.
      - |
        • Код операции определяет продавец в настройках терминала, поэтому банк Уралсиб не может изменить ее
        • Аналитика расходов не проверяет условия начисления кешбэка в программе «Уралсиб Бонус»
  image:
    appjaicp: 3_22_3_Расходы за месяц и Аналитика расходов
    uralsib: 3_22_3_monthly_expenses_and_expense analytics

ManageCardsAnalyticsLink: Вы можете посмотреть аналитику расходов по вашей карте по [ссылке]({{$temp.DBOCardAnalyticsLink}})

ManageCardsDetails:
  isAuthorized:
    web:
      - |
        Для просмотра реквизитов карты и срока ее действия на главном экране выберите нужную карту и нажмите вкладку «Информация».
      - |
        Реквизиты счета как правило предоставляют организациям для расчетов. Вы можете сохранить их на телефон, либо переслать удобным способом.
        Не сообщайте номер карты вместе со сроком действия и трехзначный код безопасности (CVC) на обороте карты и используйте только надежные интернет-магазины.
    iosOrAndroid:
      - |
        Для просмотра реквизитов карты и срока ее действия:
        1. На главном экране выберите нужную карту.
        2. Далее «О карте» -> «Реквизиты карты/счета».
      - |
        Реквизиты счета как правило предоставляют организациям для расчетов. Вы можете сохранить их на телефон, либо переслать удобным способом.
        Не сообщайте номер карты вместе со сроком действия и трехзначный код безопасности (CVC) на обороте карты и используйте только надежные интернет-магазины.
    reply:
        - Реквизиты карты нужны для оплаты в интернете и перевода с карты на карту. Реквизиты счета как правило предоставляют организациям для расчетов. Вы можете сохранить их на телефон, либо переслать удобным способом.
        - Не сообщайте номер карты вместе со сроком действия и трехзначный код безопасности (CVC) на обороте карты и используйте только надежные интернет-магазины.
    question: По какой карте нужны реквизиты?
  isNotAuthorized:
    - |
      Просмотреть реквизиты карты и срок ее действия можно:
      1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online): выберите карту -> «О карте» -> «Реквизиты карты/счета». 
    - |
      2. В [веб-версии на сайте](https://online.uralsib.ru): выберите карту -> «Реквизиты карты/счета».
      3. В [офисе банка]({{$temp.OfficeLink}}), при себе нужно иметь паспорт.
  inactiveApi:
    - |
        Для просмотра реквизитов карты и срока ее действия:
        1. На главном экране выберите нужную карту.
        2. Далее «О карте» -> «Реквизиты карты/счета».
    - |
        Реквизиты счета как правило предоставляют организациям для расчетов. Вы можете сохранить их на телефон, либо переслать удобным способом.
        Не сообщайте номер карты вместе со сроком действия и трехзначный код безопасности (CVC) на обороте карты и используйте только надежные интернет-магазины.
  image:
    appjaicp: 3_22_3_Реквизиты карты и счета
    uralsib: 3_22_3_details_card_and_account
    
ManageCardsDetailsLink: Вы можете узнать реквизиты вашей карты по [ссылке]({{$temp.DBOCardDetailsLink}})

