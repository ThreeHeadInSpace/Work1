ManageCardsNotifications:
  isAuthorized:
    question: Уведомления по какой карте вы хотели бы настроить?
    web: 
      - |
       Для настройки уведомлений по операциям:
       1. На главном экране выберите нужную карту.
       2. Внизу страницы «Сервисы».
      - |
       Варианты уведомлений: 
        • «Сервис уведомлений» — уведомления в приложении. Если уведомление не дойдет, направляется СМС. Первый месяц предоставляется бесплатно. Со второго месяца — 129 рублей в месяц.
        • «Сервис уведомлений Старт» — только уведомления в приложении. Без комиссии
        • «Без уведомлений»
    iosOrAndroid: 
      - |
       Для настройки уведомлений по операциям:
       1. На главном экране выберите нужную карту.
       2. Далее «Управление» -> «Сервис уведомлений».
      - |
       Варианты уведомлений: 
        • «Сервис уведомлений» — уведомления в приложении. Если уведомление не дойдет, направляется СМС. Первый месяц предоставляется бесплатно. Со второго месяца — 129 рублей в месяц.
        • «Сервис уведомлений Старт» — только уведомления в приложении. Без комиссии
        • «Без уведомлений»
  isNotAuthorized:
    - |
      Настроить уведомления по операциям можно:
        1. В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online): выберите карту -> «Управление» -> «Сервис уведомлений».
        2. В [веб-версии на сайте](https://online.uralsib.ru): выберите карту, затем внизу страницы «Сервисы».
        3. В [банкомате Уралсиба]({{$temp.ATMLink}})
        4. В [офисе банка]({{$temp.OfficeLink}}), при себе нужно иметь паспорт.
    - |
      Варианты уведомлений: 
        • «Сервис уведомлений» — уведомления в приложении. Если уведомление не дойдет, направляется СМС. Первый месяц предоставляется бесплатно. Со второго месяца — 129 рублей в месяц.
        • «Сервис уведомлений Старт» — только уведомления в приложении. Без комиссии
        • «Без уведомлений»

