   Изменить счет для входящих переводов можно:
   • В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online): в нижней части главного экрана раздел «Еще», выберите «Настройки СБП» → «Счет для пополнения».
   • В [веб-версии на сайте](https://online.uralsib.ru): нажмите на значок человека в правом верхнем углу, раздел «Настройки СБП» → «Счет для пополнения».
