
uralsibBonus:
  answer:
  - |
    Уралсиб Бонус — это программа лояльности для держателей кредитных и дебетовых карт Банка.
    При участии в программе за оплату покупок картой нашего банка вам могут начисляться бонусные баллы, которые можно обменять в личном кабинете — на кэшбек или услуги для путешественников.

    Подскажите, что именно вас интересует?
  buttons:
    - text: "Категории кешбэка"
      transition: "/LoyaltyProgram/UralsibBonus/Categories"
    - text: "Обмен бонусов"
      transition: "/LoyaltyProgram/UralsibBonus/Instructions"
    - text: "Информация по бонусам"
      transition: "/LoyaltyProgram/UralsibBonus/Question"
    - text: "Вопросы по подключению и обмену"
      transition: "/LoyaltyProgram/UralsibBonus/Problem"
    - text: "Правила и регистрация в программе"
      transition: "/LoyaltyProgram/UralsibBonus/Participate"
    - text: "Кешбэк по ЖКХ"
      transition: "/Promo/Promo"
      
Categories:
  answer: Какой у вас вопрос по категориям Уралсиб бонус?
  buttons:
    - text: "Как выбрать категории"
      transition: "/LoyaltyProgram/UralsibBonus/Categories/Choose"
    - text: "Как проверить выбранные категории"
      transition: "/LoyaltyProgram/UralsibBonus/Categories/Check"
      
Choose:
    isNotAuthorized: |
       Выбрать категории можно:
       • В приложении «Уралсиб Онлайн»: выберите карту -> «Управление» -> «Уралсиб Бонус» -> «Любимые категории»
       • В веб-версии на [сайте](https://online.uralsib.ru/). Выберите карту -> внизу страницы «Сервисы» -> «Уралсиб Бонус» -> «Любимые категории»
    web: |
        Для выбора категорий:
        1. На главном экране выберите нужную карту.
        2. Внизу страницы [«Сервисы»]({{$temp.bonusLink}})
    mobile: |
        Для выбора категорий:
        1. На главном экране выберите нужную карту.
        2. Далее «Управление» –> [«Уралсиб Бонус»]({{$temp.bonusLink}})
    final: |
        Выбрать категории на месяц можно, начиная с 27 числа предыдущего месяца и до последнего календарного дня текущего месяца.
        Бонусные рубли не начисляются за покупки в категориях по кредитным картам «120 дней на максимум» и «Премиальная кредитная карта».

Check:
    isNotAuthorized: |
       Увидеть выбранные категории можно:
       • В приложении «Уралсиб Онлайн»: выберите карту -> «Управление» -> «Уралсиб Бонус» -> «Любимые категории»
       • В веб-версии на [сайте](https://online.uralsib.ru/). Выберите карту -> внизу страницы «Сервисы» -> «Уралсиб Бонус» -> «Любимые категории»
    web: |
        Для просмотра выбранных категорий:
        1. На главном экране выберите нужную карту.
        2. Внизу страницы [«Сервисы»]({{$temp.bonusLink}})
    mobile: |
        Для просмотра выбранных категорий:
        1. На главном экране выберите нужную карту.
        2. Далее «Управление» –> [«Уралсиб Бонус»]({{$temp.bonusLink}})
        
Instructions:
  answer: На какое вознаграждение хотите потратить бонусы?
  buttons:
    - text: "Компенсация покупок"
      transition: "/LoyaltyProgram/UralsibBonus/Instructions/Compensation"
    - text: "Путешествия"
      transition: "/LoyaltyProgram/UralsibBonus/Instructions/Trips"
    - text: "РЖД Бонус"
      transition: "/LoyaltyProgram/UralsibBonus/Instructions/RZD"
      
Compensation:
    isNotAuthorized: |
        Для компенсации доступны покупки предыдущего месяца на сумму от 1500 до 50 000 рублей:
        1. В приложении «Уралсиб Онлайн» или его [веб-версии](https://online.uralsib.ru/) выберите раздел «Уралсиб бонус» — далее «Компенсация покупок».
        3. Операции, подходящие по критериям (дата и сумма) будут маркированы зеленой иконкой.
        4. Выберите подходящую покупку и нажмите «Компенсировать».
    Authorized: |
        Для компенсации доступны покупки предыдущего месяца на сумму от 1500 до 50 000 рублей.
        Для обмена:
        1. Выберите раздел «Уралсиб бонус» — далее «Компенсация покупок».
        2. Операции, подходящие по критериям (дата и сумма) будут маркированы зеленой иконкой.
        3. Выберите подходящую покупку и нажмите «Компенсировать».
    final: |
        Сроки зачисления кешбэка — не позднее 10 рабочих дней.
        Кешбэк зачисляется на карту, подключенную к программе Уралсиб Бонус последней.
        Частичная компенсация не предусмотрена.
        
Trips:
    isNotAuthorized: |
        Оплатить услуги для путешественников можно полностью или частично, для этого: 
        1. В приложении «Уралсиб Онлайн» или его [веб-версии](https://online.uralsib.ru/) выберите раздел «Уралсиб бонус»  —  далее «Путешествия».
        2. Подберите билет, отель или автомобиль для аренды и заполните все необходимые поля.
        3. На этапе оплаты укажите, что хотите использовать бонусные рубли.
        4. Завершите оплату и оформление заказа. 
    Authorized: |
        Оплатить услуги для путешественников можно полностью или частично, для этого: 
        1. Выберите раздел «Уралсиб бонус» — далее «Путешествия».
        2. Подберите билет, отель или автомобиль для аренды и заполните все необходимые поля.
        3. На этапе оплаты укажите, что хотите использовать бонусные рубли.
        4. Завершите оплату и оформление заказа. 
    final: После оплаты услуг вы получите подтверждение бронирования либо билеты на адрес электронной почты.
    
RZD:
    isNotAuthorized: |
        Для обмена бонусов на бонусы РЖД:
        1. В приложении «Уралсиб Онлайн» или его [веб-версии](https://online.uralsib.ru/) выберите раздел «Уралсиб бонус» — далее «Бонусы партнеров».
        2. Укажите номер счета «РЖД Бонус». Перевести бонусные рубли можно как на свой счет, так и на счет своего родственника или друга.
        3. Введите сумму бонусных рублей для обмена (минимум 100 бонусных рублей).
    Authorized: |
        Для обмена бонусов на бонусы РЖД:
        1. Выберите раздел «Уралсиб бонус» — далее «Бонусы партнеров».
        2. Укажите номер счета «РЖД Бонус». Перевести бонусные рубли можно как на свой счет, так и на счет своего родственника или друга.
        3. Введите сумму бонусных рублей для обмена (минимум 100 бонусных рублей).
    final: |
        Бонусы будут зачислены на счет «РЖД Бонус» в течение 10 рабочих дней.
        Курс обмена бонусных рублей на баллы «РЖД Бонус» 1 бонусный рубль = 1 балл.
        
Question:
  answer: Какой у вас вопрос по бонусам программы лояльности?
  buttons:
    - text: "Баланс бонусных рублей"
      transition: "/LoyaltyProgram/UralsibBonus/Balance"
    - text: "История движения бонусов"
      transition: "/LoyaltyProgram/UralsibBonus/History"
    - text: "Сроки зачисления бонусов"
      transition: "/LoyaltyProgram/UralsibBonus/Question/Period"
    - text: "Срок использования бонусов"
      transition: "/LoyaltyProgram/UralsibBonus/Question/Expiration"
    - text: "Не зачислены бонусы"
      transition: "/LoyaltyProgram/UralsibBonus/Question/NotArrive"
     
Period: 
    isNotAuthorized: 
     - |
       Бонусные рубли зачисляются на бонусный счет в течение 10 рабочих дней после подтверждения покупки.
     - |
       Посмотреть историю начисления бонусов можно:
       • В приложении «Уралсиб Онлайн»: выберите карту -> «Управление» -> «Уралсиб Бонус»
       • В веб-версии на [сайте](https://online.uralsib.ru/). Выберите карту -> внизу страницы «Сервисы».
    web: 
     - |
       Бонусные рубли зачисляются на бонусный счет в течение 10 рабочих дней после подтверждения покупки.
     - |
       Для просмотра истории начисления бонусов:
       1. На главном экране выберите нужную карту
       2. Внизу страницы [«Сервисы»]({{$temp.bonusLink}})
    mobile: 
     - |
       Бонусные рубли зачисляются на бонусный счет в течение 10 рабочих дней после подтверждения покупки..
     - |   
       Для просмотра истории начисления бонусов:
       1. На главном экране выберите нужную карту.
       2. Далее «Управление» –> [«Уралсиб Бонус»]({{$temp.bonusLink}})
       
Expiration:
    answer: |
        Бонусные рубли сгорают, если:
        1. Не использовать их в течение 12 месяцев.
        2. В течение 6 месяцев не было выполнено одно из условий:
        • Не зачислены новые бонусы
        • Не произошел обмен бонусов
        • Не было покупок по любой из карт, в том числе и кредитных.
        
NotArrive:
    answer: |
        Может быть несколько причин неначисления бонусов:
        • не выбраны категории на месяц или покупка совершена до выбора категорий
        • оплата покупки по QR коду или по СБП
        • покупка еще обрабатывается
        • покупка оплачена кредитной картой «120 дней на максимум» или «Премиальная кредитная карта»
        • покупка не входит в выбранные категории
        • кешбэк за покупку составляет менее 1 бонусного рубля.
    buttons:
    - text: "Причина не подошла"
      transition: "/LoyaltyProgram/UralsibBonus/Question/NotArrive/Reasons"
      
Reasons:
    isNotAuthorized: |
        Для проверки причины неначисления бонусов, напишите в чат:
        • приложения [«Уралсиб Онлайн»](https://uralsib.ru/online) 
        • или его [веб-версии](https://online.uralsib.ru/)
    Authorized: Чтобы разобраться с начислением бонусов, передам ваш запрос оператору.
    
Problem:
    isNotAuthorized: |
        При возникновении вопросов по программе Уралсиб бонус, напишите в чат:
        • приложения [«Уралсиб Онлайн»](https://uralsib.ru/online) 
        • или его [веб-версии](https://online.uralsib.ru/)
    Authorized: Перевожу вас на оператора — он посмотрит информацию по бонусной программе и подскажет дальнейшие шаги.

participate:
  - |
    Если вы являетесь владельцем дебетовой карты «Прибыль» или кредитной карты «С кешбэком», то программа «Уралсиб Бонус» подключится к карте автоматически.
    В остальных случаях зарегистрироваться в программе лояльности можно:
    • В разделе «О карте»
    • Подразделе «Сервисы»
  - |
    Доступ предоставляется не позднее 14 рабочих дней, но на практике этот срок зачастую меньше — 1-2 рабочих дня.
  - |
    Правила бонусной программы указаны на сайте [«Уралсиб Бонус»](https://bonus.uralsib.ru/rules) 

# conditions:
#   - |
#     Начисление бонусов производится за «Кешбэк в категориях»:
#     • Выбирайте каждый месяц 3 категорий кешбэка из 5 предложенных банком
#     • Оплачивайте картой покупки в выбранных категориях
#     • Получайте до 3 000 бонусных рублей в месяц
#   - |
#     Выбрать категории можно с 27 числа предыдущего месяца до последнего числа месяца трат.
#     Изменить выбранные категории нельзя, выбрать можно только все категорий единовременно.
#   - |
#     Бонусы рассчитываются за каждую транзакцию и отражаются в истории операций личного кабинета и сразу доступны для использования

# spend:
# - |
#   Бонусы можно использовать:
#   • Для компенсации ранее совершенной покупки на сумму от 1 500 до 50 000 рублей. Деньги в размере суммы компенсированной покупки зачислятся на ваш счет не позднее следующего рабочего дня
#   • Для частичной или полной оплаты услуг для путешественников. Сразу после оплаты услуг вы получаете подтверждение бронирования, либо билеты на адрес электронной почты
#   • Для обмена на бонусы «РЖД Бонус»

