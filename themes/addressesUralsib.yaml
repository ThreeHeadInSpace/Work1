# Адреса Уралсиб
ATMOrOffice:
  replies:
    - Уточните вам нужно отделение банка Уралсиб или банкомат?
    - Подскажите, вам требуется отделение Уралсиба или банкомат?
  buttons:
    - text: "Отделение банка"
      transition: "/AddressesUralsib/ATMOrOffice/Office"
    - text: "Банкомат"
      transition: "/AddressesUralsib/ATMOrOffice/ATM"
Office:
  isNotAuthorized:
    - Карта отделений банка доступна на [сайте Уралсиб](https://uralsib.ru/office-atm/offices/map)
    - Адреса и режим работы офисов банка вы найдете на нашем [сайте](https://uralsib.ru/office-atm/offices/map)
  web: 
    - 'Карта отделений банка доступна [по ссылке]({{$temp.officeLink}})'
    - 'Адреса и режим работы офисов банка вы найдете [по ссылке]({{$temp.officeLink}})'
    # - |
    #   Чтобы подобрать офис банка:
    #   1. На главном экране войдите в раздел «Еще» или нажмите значок с человечком в правом верхнем углу экрана
    #   2. Выберите «Банкоматы, терминалы и отделения»
    #   В разделе на карте можно посмотреть адреса и режим работы офисов.
    # - Адреса и режим работы офисов банка доступны в разделе «Еще» -> «Банкоматы Терминалы Отделения».
  iosOrAndroid:
    - 'Карта отделений банка доступна [по ссылке]({{$temp.officeLink}})'
    - 'Адреса и режим работы офисов банка вы найдете [по ссылке]({{$temp.officeLink}})'
  
#     - | 
#   Полный график работы в выходные дни, а также список дежурных офисов размещены по [ссылке](https://uralsib.ru/blog/rezhim-raboty-otdeleniy-banka-uralsib-v-prazdnichnyy-period_26)
#   - |
#     Круглосуточно доступны:
#     • Мобильное приложение
#     • Банкоматы и терминалы
#     • Онлайн поддержка: горячая линия и чат
    
#     Счастливых праздников!

ATM:
  isNotAuthorized:
    - Карта банкоматов Уралсиба и банков-партнеров доступна на [сайте Уралсиб](https://uralsib.ru/office-atm/atms/map)
    - Адреса и режим работы банкоматов Уралсиба и банков-партнеров вы найдете на нашем [сайте](https://uralsib.ru/office-atm/atms/map)
  web: 
    - 'Карта банкоматов Уралсиба и банков-партнеров доступна по [ссылке]({{$temp.ATMLink}}}'
    - 'Адреса и режим работы банкоматов Уралсиба и банков-партнеров вы найдете по [ссылке]({{$temp.ATMLink}})'
    # - |
    #   Чтобы подобрать банкоматы Уралсиба и банков-партнеров:
    #   1. На главном экране войдите в раздел «Еще» или нажмите значок с человечком в правом верхнем углу экрана
    #   2. Выберите пункт «Банкоматы, терминалы и отделения»
    #   В разделе на карте можно посмотреть адреса и режим работы банкоматов.
    # - Адреса и режим работы банкоматов Уралсиба и банков-партнеров доступны в разделе «Еще» -> «Банкоматы Терминалы Отделения».
  iosOrAndroid:
    - 'Карта банкоматов Уралсиба и банков-партнеров доступна по [ссылке]({{$temp.ATMLink}}}'
    - 'Адреса и режим работы банкоматов Уралсиба и банков-партнеров вы найдете по [ссылке]({{$temp.ATMLink}})'

