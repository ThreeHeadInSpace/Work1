# Ипотека
Mortgage:
  Consultation:
    - Проконсультирую вас об оформлении ипотечного кредита.
    - Готов рассказать вам подробности об ипотечном кредитовании в банке Уралсиб.
    - Проконсультирую вас об оформлении ипотечного кредита.
    - Готов рассказать вам подробности об ипотечном кредитовании в банке Уралсиб.
  Choose:
    - Уточните, какая операция вам требуется?
    - Выберите интересующую вас операцию.

  buttons:
    - text: "Оформить заявку"
      transition: "/Mortgage/Mortgage/Request"
    - text: "Ознакомиться с условиями"
      transition: "/Mortgage/Mortgage/Conditions"

Request:
  - 'Подать заявку на ипотечный кредит вы можете по [ссылке]({{$temp.MortgageLink}})'

Conditions:
  firstReplies:
  - |
    Требования к заемщику для оформления ипотечного кредита:
    • Гражданство РФ с постоянной регистрацией на территории РФ
    • Возраст от 21 года до 70 лет на момент погашения кредита
    • Официальное трудоустройство более 3 месяцев или срок регистрации ИП более 1 года

    Подскажите, вы подходите под требования банка?
  buttons:
    - text: "Да"
      transition: "/Mortgage/Mortgage/Conditions/Agree"
    - text: "Нет"
      transition: "/Mortgage/Mortgage/Conditions/Disagree"

Agree:
  - |
    Программы ипотечного кредитования в банке Уралсиб:
    • [Вторичное жилье]({{$temp.link["OldMortgageLink"]}})
    • [Новостройки]({{$temp.link["NewMortgageLink"]}})
    • [Ипотека для семей с детьми]({{$temp.link["FamilyMortgageLink"]}})
    • [Коммерческая недвижимость]({{$temp.link["CommerceMortgageLink"]}})
    • [Кредит под залог недвижимости]({{$temp.link["DepositMortgageLink"]}})
    • [Рефинансирование]({{$temp.link["RefinancingLink"]}})
  -  Оставить заявку на рассмотрение и ознакомиться со всеми ипотечными программами и услугами можно по [ссылке]({{$temp.link["MortgageLink"]}})

Disagree: |
  Понял вас. К сожалению, в таком случае вам может быть отказано в оформлении ипотечного кредита.

  Более подробные условия и ответы на частозадаваемые вопросы вы сможете найти по [ссылке]({{$temp.MortgageLink}})
