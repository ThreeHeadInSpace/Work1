# Мобильное приложение
MobileRegistration:
    unauthorized: |
        Подробности об установке мобильного приложения вы найдете по ссылкам:
          • Для владельцев iOS — https://uralsib.ru/online/ios
          • Для владельцев Android — https://uralsib.ru/online/android
    authorized_ios:
        Детали по установке мобильного приложения вы найдете по [ссылке](https://uralsib.ru/online/ios)
    authorized_android:
        Подробности об установке мобильного приложения вы найдете по [ссылке](https://uralsib.ru/online/android)
    final: |
        Зарегистрироваться в мобильном приложении банка Уралсиб можно самостоятельно через [«Уралсиб Онлайн»](https://uralsib.ru/online) или мобильное приложение «Уралсиб Онлайн». 
        Для этого понадобятся активная карта или счет и зарегистрированный в банке телефон. Этот телефон будет использован в качестве логина.

MobileBlock: Чтобы решить вопрос с блокировкой приложения, перевожу вас на оператора.

MobileUnblock: |
    Разблокировка мобильного приложения «Уралсиб Онлайн» возможна только при личном посещении отделения банка.

    Адреса отделений Уралсиб можно найти по [ссылке]({{$temp.link}})
