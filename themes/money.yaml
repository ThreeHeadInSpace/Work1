#Вопросы, связанные с деньгами
Money:
    reply: Ваш вопрос связан с денежными средствами, но сейчас не хватает информации для ответа. Выберите вариант или напишите вопрос подробнее.
    buttons: 
        - text: Заказать наличные
          transition: "/CashOrder/CashOrder/Request"
        - text: Оформить кредит
          transition: "/ConsumerLoan/ConsumerLoan/Request"
        - text: Не поступили деньги
          transition: "/Money/Money/NotArrive"
        - text: Списались средства
          transition: "/Money/Money/WrittenOff"

NotArrive: 
    reply: Понимаю, что ситуация неприятная. Расскажите подробнее о произошедшем, а я соединю вас с оператором. 

WrittenOff:
    isNotAuthorized: |
        Проверить причину списания, или откуда поступили деньги, можно в выписке:
          • В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online) на главном экране выберите нужный продукт -> нажмите на кнопку «Управление» -> «Выписка и справки»
          • В [веб-версии](https://online.uralsib.ru/) выберите нужный продукт и откройте вкладку «Действия»
    
    iosOrAndroid: |
        Проверить причину списания, или откуда поступили деньги, можно в выписке. Для этого:
        1. На главном экране выберите нужную карту или счет.
        2. Нажмите на кнопку «Управление».
        3. Далее «Выписка и справки».
        
Salary: По вопросам зачисления зарплаты, а также в случаях ее невыплаты или расхождения в сумме — обратитесь к вашему работодателю.
