#Все что связано с номером телефона
phoneCC:
  firstReplies: По какому вопросу хотите позвонить в банк? Вопросы по продуктам можно решить в чате и я готов помочь. Если я не справлюсь, позову оператора.

  finalReply: Позвонить на горячую линию можно по номеру 8-800-250-57-57.
  
CallBack: С радостью помогу вам решить вопросы, связанные с продуктами и услугами банка. Если я не справлюсь, позову оператора.

Banner: |
    Рекламный баннер в приложении — это предложение банка, а не активный продукт. Даже если показан «баланс», деньги не зачислены и продукт не оформлен.
    Отключить баннер технически невозможно. 
    
NumberChange:
    isNotAuthorized: |
        Для изменения номера телефона в сервисах банка: подтверждение операций, СМС-информирование, 3D Secure или СБП, нужно обновить доверенный номер.
        Изменить его можно: 
        • В приложении [«Уралсиб Онлайн»](https://uralsib.ru/online): внизу главного экрана нажмите «Ещё» -> далее «Мои данные» -> «Номер телефона»
        • В [веб-версии](https://online.uralsib.ru/): сверху справа на главном экране нажмите на иконку «человечка» -> далее «Мои данные» -> «Номер телефона»
    web: |
        Для изменения номера телефона в сервисах банка: подтверждение операций, СМС-информирование, 3D Secure или СБП, нужно обновить доверенный номер. Для этого:
        • Сверху справа на главном экране нажмите на иконку «человечка» 
        • Далее «Мои данные» – «Номер телефона»
    iosOrAndroid: |
        Для изменения номера телефона в сервисах банка: подтверждение операций, СМС-информирование, 3D Secure или СБП, нужно обновить доверенный номер. Для этого:
        • Внизу главного экрана нажмите «Ещё»
        • Далее «Мои данные» – «Номер телефона»
    final: 
        - |
            После подачи заявки с вами свяжется сотрудник для подтверждения номера. Заявка подана:
            • с 08:00 до 20:00 по МСК - через 30 минут
            • после 20:00 по МСК – с 08:00 по МСК
            Не забудьте отключить услугу антиспам.
        - |
            Обратите внимание, номер также изменится для входящих переводов по СБП.
            Для того чтобы номер изменился и для СМС-информирования и 3D Secure нужно верифицировать номер. Для этого позвоните на горячую линию по номеру 8-800-250-57-57.
            
CallFromTheBank: 
    answer: |
        Чтобы помочь вам с проверкой звонка из банка, уточните: вы ранее оставляли заявку на банковский продукт или вам поступил звонок без предварительного обращения с вашей стороны? 
    buttons:
        - text: "Оставлял заявку"
          transition: "/Application/Application/Status"
        - text: "Другое"
          transition: "/PhoneCC/CallFromTheBank/Other"
      
Other:
    NotAuthorized: Для уточнения информации по звонку из банка  напишите в чат приложения [«Уралсиб Онлайн»](https://uralsib.ru/online) или его [веб-версии](https://online.uralsib.ru/)
    Authorized: Расскажите подробнее с какого номера поступил звонок, а я соединю вас с оператором. 
