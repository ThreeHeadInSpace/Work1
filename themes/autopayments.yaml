# Автоплатеж
autopaymentsoff: 
  answer:
  - |
    Уточните отключение автоплатежа по какому продукту вас интересует: 

  buttons:
    - text: "Платеж по шаблону"
      transition: "/Autopayments/AutopaymentsOff/Patterns"
    - text: "СМС"
      transition: "/SMSNotifications/SMSOff"
    - text: "Подписки"
      transition: "/Subscription/Subscription/TurnOff"
      
Patterns:
    isNotAuthorized:
     - |
      Удалить автоплатеж можно:
      • В приложении «Уралсиб Онлайн»: на глваном экране выберите раздел «Платежи» -> «Мои шаблоны» -> свайпните шаблон влево и нажмите на удаление.  
      • В веб-версии на [сайте](https://online.uralsib.ru/) : выберите раздел «Платежи» -> внизу страницы в правом углу нажмите «Шаблоны» -> «Настройки шаблона» -> в правом верхнем углу нажмите на значок «Корзина» и подтвердите удаление.

    iosOrAndroid:
    - |
      Чтобы удалить автоплатеж:
      • Внизу главной страницы выберите раздел «Платежи» 
      • Далее «Мои шаблоны», свайпните шаблон влево и нажмите на удаление
    web: 
    - |
      Чтобы удалить автоплатеж:
      • Снизу главного экрана выберите раздел «Платежи» 
      • Внизу страницы в правом углу нажмите «Шаблоны» -> «Настройки шаблона» 
      • В правом верхнем углу нажмите на значок «Корзина» и подтвердите удаление
          
