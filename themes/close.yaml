# Закрытие_уточнение
Close: 
  answer:
  - |
    Я понял, что ваш вопрос связан с закрытием, но пока еще не хватает информации, чтобы дать ответ. Выберите, что хотите закрыть: 
  buttons:
    - text: "Карта"
      transition: "/CloseCard/CloseCard"
    - text: "Счет"
      transition: "/Deposits/Account/Close"
    - text: "Вклад"
      transition: "/Deposits/Deposit/Close"
    - text: "Кредит"
      transition: "/MobileAppNavigation/DBONavigation/Loans/EarlyRepayment"  
      
Status: 
  answer: Уточните какой продукт закрывали?
  buttons:
    - text: "Кредитная карта"
      transition: "/Close/Status/CreditCard"
    - text: "Дебетовая карта"
      transition: "/Close/Status/DebitCard"
    - text: "Счет"
      transition: "/Close/Status/Account"
    - text: "Вклад"
      transition: "/Close/Status/Deposit" 
    - text: "Кредит"
      transition: "/Close/Status/Loan" 
      
CreditCard:
    answer: |
      Кредитная карта закрывается по истечении 45 дней после подачи заявления на закрытие.
      В течение первых 14 дней, после подачи заявки на закрытие карты, действует период охлаждения, карта и счет остаются активными. 
      Если воспользоваться картой в этот период, заявка на закрытие будет отменена и картой можно будет продолжать пользоваться.
    buttons:
        - text: "Срок уже вышел"
          transition: "/Close/Status/CreditCard/Expired"
          
ExpiredCreditCard: 
    isNotAuthorized: Для проверки статуса закрытия кредитной карты напишите нам в чате «Уралсиб Онлайн».
    Authorized: Для проверки статуса закрытия кредитной карты перевожу вас на оператора. Пожалуйста, ожидайте.

DebitCard: 
    answer: Дебетовая карта закрывается по истечении 45 дней после подачи заявления на закрытие. При этом все операции по карте блокируются.
    buttons:
        - text: "Срок уже вышел"
          transition: "/Close/Status/DebitCard/Expired"
          
ExpiredDebitCard: 
    isNotAuthorized: Для проверки статуса закрытия карты напишите нам в чате «Уралсиб Онлайн».
    Authorized: Для проверки статуса закрытия карты перевожу вас на оператора. Пожалуйста, ожидайте.

Account:
    answer: Счет закрывается в течение 40 дней после подачи заявления на закрытие.
    buttons:
        - text: "Срок уже вышел"
          transition: "/Close/Status/Account/Expired"
         
ExpiredAccount: 
    isNotAuthorized: Для проверки статуса закрытия счета напишите нам в чате «Уралсиб Онлайн».
    Authorized: Для проверки статуса закрытия счета перевожу вас на оператора. Пожалуйста, ожидайте.

Deposit:
    answer: 
        - |
          Срочный вклад закрывается автоматически в дату, указанную при открытии. Деньги поступят на счет, выбранный при оформлении. 
        - |
          Вклад с пролонгацией автоматически продлевается на новый срок в дату окончания вклада, по ставке, действующей на момент продления вклада.
    buttons:
        - text: "Вклад не закрылся"
          transition: "/Close/Status/Deposit/Expired"
          
ExpiredDeposit: 
    isNotAuthorized: Для проверки статуса закрытия вклада напишите нам в чате «Уралсиб Онлайн».
    Authorized: Для проверки статуса закрытия вклада перевожу вас на оператора. Пожалуйста, ожидайте.

Loan:
    answer: Кредит закрывается на следующий рабочий день после полного погашения задолженности.
    buttons:
        - text: "Кредит не закрылся"
          transition: "/Close/Status/Loan/Expired"
          
ExpiredLoan: 
    isNotAuthorized: Для проверки статуса закрытия кредита напишите нам в чате «Уралсиб Онлайн».
    Authorized: Для проверки статуса закрытия кредита перевожу вас на оператора. Пожалуйста, ожидайте.
