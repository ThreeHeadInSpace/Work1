# Платные подписки
Subscription:
    reply: Я понял что, ваш вопрос связан с подписками на платные сервисы, оформленные по карте банка. Если речь о другом, напишите подробнее.
    buttons:
        - text: Статус подписки
          transition: /Subscription/Subscription/Status
        - text: Подключить подписки
          transition: /Subscription/Subscription/TurnOn
        - text: Отменить подписки
          transition: /Subscription/Subscription/TurnOff
        
Status: 
    isNotAuthorized: |
       Проверить действующие подписки на платные сервисы можно:
       • В приложении «Уралсиб Онлайн»: на главном экране выберите нужную карту -> вкладка «О карте» -> далее «Подписки на сервисы» -> «Мои подписки»
       • В [веб-версии](https://online.uralsib.ru/) на главном экране выберите нужную карту -> блок «Информация» -> далее «Подписки на сервисы» -> «Мои подписки»
    web: |
        Проверить действующие подписки на платные сервисы можно:
        1. На главном экране приложения выберите нужную карту - блок «Информация».
        2. Далее «Подписки на сервисы» - «Мои подписки».
    iosOrAndroid: |
        Проверить действующие подписки на платные сервисы можно:
        1. На главном экране приложения выберите нужную карту - вкладка «О карте».
        3. Далее «Подписки на сервисы» - «Мои подписки».
   
TurnOn:
    isNotAuthorized: |
       Подключить интересующую вас подписку можно:
       • В приложении «Уралсиб Онлайн»: на главном экране выберите нужную карту -> вкладка «О карте» -> далее «Подписки на сервисы» -> «Мои подписки».
       • В [веб-версии](https://online.uralsib.ru/) на главном экране выберите нужную карту -> блок «Информация» -> далее «Подписки на сервисы» -> «Мои подписки».
    web: |
        Для подключения интересующей вас подписки:
        1. На главном экране интернет-банка выберите нужную карту - блок «Информация».
        2. Далее «Подписки на сервисы» - «Мои подписки».
        3. В разделе - «Доступные сервисы» выберите нужную подписку из перечня.
    iosOrAndroid: |
        Для подключения интересующей вас подписки:
        1. На главном экране приложения выберите нужную карту - вкладка «О карте».
        2. Далее «Подписки на сервисы» - «Мои подписки».
        3. В разделе - «Доступные сервисы» выберите нужную подписку из перечня.
    final: |
        Далее:
        1. Ознакомьтесь с условиями нажмите «Подключить».
        2. В открывшемся окне нажмите «К оплате». Подписка оплачивается через СБП.
        3. Из выпадающего списка выберите счет для оплаты и нажмите «Перевести».
        4. Подписка будет отображена в разделе - «Мои подписки» - не позднее следующего рабочего дня.

TurnOff:
    isNotAuthorized: |
       Отключить действующие подписки на платные сервисы можно: 
       • В приложении «Уралсиб Онлайн»: на главном экране выберите нужную карту -> вкладка «О карте» -> далее «Подписки на сервисы» -> «Мои подписки» -> «Показать все»
       • В [веб-версии](https://online.uralsib.ru/) на главном экране выберите нужную карту -> блок «Информация» -> далее «Подписки на сервисы» -> «Мои подписки» -> «Показать все»
    web: |
        Для отключения действующих подписок на платные сервисы:
        1. На главном экране приложения выберите нужную карту - блок «Информация».
        2. Далее «Подписки на сервисы» - «Мои подписки» - «Показать все».
        3. Выберите баннер с нужной подпиской.
    iosOrAndroid: |
        Для отключения действующих подписок на платные сервисы:
        1. На главном экране приложения выберите нужную карту - вкладка «О карте».
        2. Далее «Подписки на сервисы» - «Мои подписки».
        3. Выберите баннер с нужной подпиской.
    final: |
       Для отключения подписки, оформленной не через приложение Уралсиба, обратитесь в сторонний сервис.
