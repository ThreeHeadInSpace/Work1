timeOut:
  - Кажется, вы отлучились. Если у вас появятся еще вопросы, буду рад помочь с ответом.
  - Похоже, вы отлучились. Если будут вопросы, напишите мне.

anyError:
  - К сожалению, произошла техническая ошибка. Пожалуйста, обратитесь на горячую линию банка по номеру 8-800-250-57-57.
  - Возникла техническая ошибка. Пожалуйста, для продолжения консультации обратитесь на горячую линию банка по номеру 8-800-250-57-57.

limitHandler:
  firstReplies:
    - Не уверен, что понял вас. Можете переформулировать вопрос?
    - Прошу прощения, я не совсем понял вас. Пожалуйста, сформулируйте вашу мысль более кратко.
  finalReply: Это за пределами моих возможностей, но я уже зову на помощь оператора!

scriptAndDialogError:
  firstReplies:
    - Извините, не получается вас понять. Перефразируйте, пожалуйста, более коротко то, что вы хотели сказать.
    - Простите, я не совсем понял вас. Пожалуйста, сформулируйте вашу мысль более кратко.
  finalReply: Сожалею, что не могу помочь сам. Но рядом есть человек, который точно разберется – подключаю.

obscene:
  - Я верю, что мы найдем решение в рамках общепринятой манеры общения.
  - Понимаю ваше возмущение, но прошу вести беседу в конструктивном ключе.
  - Прошу вас выражаться корректнее, иначе мне будет сложно вам помочь.