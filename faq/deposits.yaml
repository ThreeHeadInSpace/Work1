depositInsurance:
  - 'Все вклады в банке застрахованы.'
  - 'Уралсиб состоит в реестре банков - участников системы обязательного страхования вкладов.'
insuranceCompensation:
  - >
    При наступлении страхового случая:
      • Проценты рассчитываются в день страхового случая
      • По валютным счетам проценты выплачиваются в рублях по курсу ЦБ РФ на дату страхового случая.
  - 'Если в банке несколько вкладов, возмещение выплачивается пропорционально размеру каждого вклада, но не более максимального размера возмещения.'
interestInsurance:
  'Проценты по вкладу застрахованы, если по условиям договора они начисляются на счет вклада.'
2024YearTax:
  - 'Налог оплачивается с процентов по вкладам и остатках на счетах, если они превышают определенный лимит.'
  - 'Расчет лимита: 1 млн рублей и умножается на максимальную ключевую ставку ЦБ РФ за налоговый период. В 2024 году ключевая ставка — 21%. Лимит равен 210 000 рублей.'
documentsForDeposit:
  - >
    Для открытия счета гражданину РФ нужно предоставить один из документов:
      • Паспорт
      • Загранпаспорт, дипломатический паспорт, служебный паспорт
      • Временное удостоверение личности, выданное на период оформления паспорта
  - >
    Другие документы, удостоверяющие личность:
      • Для граждан РФ младше 14 лет — свидетельство о рождении
      • При наличии приложить ИНН и СНИЛС
documentsForMinors:
  - >
    Для несовершеннолетних граждан РФ:
      • От 14 лет: паспорт, согласие и паспорт законного представителя
      • До 14 лет: свидетельство о рождении и паспорт законного представителя
  - >
    Для несовершеннолетних иностранных граждан: паспорт или другой документ, удостоверяющий личность
documentsForForeigners:
  - >
    Для открытия счета иностранному гражданину нужно предоставить один из документов:
      • Паспорт иностранного гражданина
      • Другой документ, удостоверяющий личность
  - >
    Лицам без гражданства, постоянно проживающим на территории РФ:
      • Вид на жительство
    Лицам без гражданства, не проживающим постоянно на территории РФ:
      • Документ, удостоверяющий личность, выданный другим государством
      • Вид на жительство
      • Разрешение на временное проживание
  - >
    Беженцам:
      • Удостоверение беженца
      • Свидетельство о рассмотрении ходатайства о признании лица беженцем