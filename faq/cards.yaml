interestCalculationWay:
  - 'Проценты по счету карты «Прибыль» выплачиваются ежемесячно в дату открытия счета, на этот же счет. Начисление процентов происходит ежедневно на фактический остаток счета на начало дня.'
  - 'Для начисления процентов в текущем месяце нужно совершить покупки по карте на сумму от 10 000 рублей в предыдущем месяце.'
serviceFee:
  - 'При невыполнении условий бесплатности за обслуживание карты комиссия списывается 5 числа месяца.'
  - 'Если 5 число выпадает на нерабочий или праздничный день, дата списания переносится на ближайший рабочий день.'
turnoverFreebies:
  - Для выполнения условий бесплатности учитываются траты по карте, совершенные в текущем месяце.
  - Исключения составляют операции с MCC, указанные в тарифном плане.
releasePriorityPass:
  - Выпуск новых карт Priority Pass прекращен с 25.07.2022 г. В том числе остановлен и перевыпуск карт Priority Pass по любой из причин, и все ранее выпущенные карты Priority Pass будут закрыты.
  - В качестве альтернативы владельцам премиальных пакетов услуг при наличии активной карты Mir Supreme сейчас доступен сервис Mir Pass.
servicePackageCommission:
  - 'Комиссия за обслуживание пакета услуг за текущий месяц будет списана в следующем месяце.'
  - 'Комиссия за обслуживание не списывается первые 2 месяца. Календарный месяц, в котором был приобретен пакет и следующий за ним. Со второго месяца необходимо выполнять условия бесплатности.'
produceCreditCardTime: |
  Именная карта изготавливается до 14 рабочих дней.

  Моментальную карту можно получить в день обращения.

produceDebitCardTime:
  - Именная карта изготавливается до 10 рабочих дней.
  - Моментальную карту можно получить в день обращения. Исключение – «Социальная карта Башкортостана» со сроком изготовления до 45 рабочих дней.

interestAccrual:
  'Выплата процентов осуществляется ежемесячно в дату открытия счета карты путем капитализации – причисления суммы процентов на счет.'

minimumPaymentCalculation:
  - 'На главном экране «Уралсиб Онлайн» выберите кредитную карту. Вам откроется информация о доступном балансе, сумме задолженности. Там же вы увидите сумму и дату погашения ближайшего минимального ежемесячного платежа.'
  - |
    Расчет минимального платежа: 3% от суммы задолженности плюс начисленные проценты за предыдущий период.

    Сумма минимального платежа составит не менее 300 рублей.
