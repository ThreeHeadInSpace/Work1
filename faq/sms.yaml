# FAQ по сервису уведомлений
changeSIMForSMS:
  'При смене SIM-карты без изменения номера СМС-сообщения будут приходить без изменений.'

reconnectingSMS:
  - 'Если льготный период не кончился, то при повторном подключении услуги «Сервис уведомлений» дата начала периода переходит с прошлого подключения.'
  - 'При повторном подключении уведомлений после окончания льготного периода будет взиматься комиссия.'

SMSNotWork: >
  Услуга «Сервис уведомлений» отключается автоматически в случаях:
    • Блокировки и изменения активного статуса карты
    • Окончания срока действия карты (если не был осуществлен её перевыпуск на очередной срок)
    • Закрытия карты
    • При недостаточности денежных средств на счете или неиспользованном лимите кредитования (по кредитным картам и договорам с овердрафтом) в размере, необходимом для списания комиссии согласно тарифному плану

  Если вы пользуетесь мобильным приложением, то направляются всплывающие уведомления.

whatIsPush: Всплывающие уведомления — это текстовое сообщение, направляемое банком клиенту с помощью интернета на мобильное устройство, к номеру которого подключена услуга «Сервис уведомлений».

pushNotWork: >
  Всплывающие уведомления отключаются автоматически:
    • Если отключается услуга «Сервис уведомлений»
    • Если вы самостоятельно отключили всплывающие уведомления в настройках смартфона или приложения «Уралсиб Онлайн»

whatIs3DSecure:
  '«3D Secure» — технология, предназначенная для обеспечения безопасности интернет-платежей, совершенных с использованием карт международных платежных систем «MASTERCARD», «VISA.», «Union Pay International».'