# для CatchAll отдельный yaml файл
whatCanYouDo:
  - Знаю все о кредитных продуктах, дебетовых картах, вкладах и депозитах. Подскажу актуальную информацию о заказе наличных, программе лояльности «Уралсиб Бонус», справках и выписках.
  - С удовольствием проконсультирую вас о продуктах и услугах банка Уралсиб, его программе лояльности, подскажу актуальную информацию о платежах, переводах, справках и выписках.

gratitude:
  - Рад помочь!
  - Не за что! Всегда готов помочь.
  - Рад, что эта информация оказалась вам полезна!

obscene:
  firstReplies:
    - Пожалуйста, попробуйте задать вопрос иначе, а я постараюсь вас понять.
    - Пожалуйста, переформулируйте свой вопрос.
  finalReply:
    Я понимаю, что это важно. Чтобы не тратить ваше время, передам запрос оператору.

dontHelp:
  firstReplies:
    - Не уверен, что понял вас. Можете переформулировать вопрос?
    - Видимо, я не совсем верно понял вас. Попробуйте, пожалуйста, переформулировать свой вопрос.
  finalReply:
    Мое программное сердце разбито – я не знаю ответа. Сейчас позову специалиста.

areYouRobot:
  - Я Уралсиб-бот, виртуальный ассистент, всегда готовый помочь с вопросами о продуктах и услугах банка.
  - Я Уралсиб-бот, цифровой помощник, отвечающий в этом чате. Готов ответить на ваши вопросы.

fileEvent:
    reply:
        - К сожалению, не могу изучить содержание присланного вами файла. Пожалуйста, подскажите, что в файле или напишете свой вопрос текстом.
        - Мне жаль, но ознакомиться с содержанием присланного вами файла я пока не могу. Напишите, пожалуйста, свой вопрос или выберите вариант ответа.
    buttons:
        - text: "Справка о доходах"
          transition: "/GeneralStates/FileEvent/Statement"
        - text: "Согласие законного представителя"
          transition: "/GeneralStates/FileEvent/Concept"
        - text: "Скриншот с неполадкой"
          transition: "/GeneralStates/FileEvent/Other"
        - text: "Другое"
          transition: "/GeneralStates/FileEvent/Other"
      
Statement: Для передачи справки о доходах перевожу на оператора.

Other: Сейчас вопросы по файлу не входят в мои задачи. Давайте позовем специалиста.

Concept: Для передачи согласия законного представителя соединяю вас с оператором.

transferToOperator:
    - Ожидайте, пожалуйста, перевожу вас на специалиста.
    - Ожидайте, пожалуйста, подключения специалиста.
    - Пожалуйста, оставайтесь в чате до подключения специалиста.

transferError:
  - Что-то пошло не так... Мы уже работаем над этим. А пока, чтобы не терять время, лучше всего связаться с нами по телефону 8 800 250 57 57.
  - Похоже техника решила отдохнуть. Но мы все равно рядом - просто позвоните на горячую линию по номеру 8 800 250 57 57.
  - Ой! Похоже, у нас случился небольшой сбой. Чтобы мы не оставили вас без помощи, позвоните, пожалуйста, на нашу горячую линию по номеру 8 800 250 57 57.

clarity:
  start: Уважаемый клиент, после восстановления сервисов банка возможны долгие ожидания в чате. Если вопрос не срочный — напишите позже. Приносим извинения.
  firstReplies:
    - Уточните, пожалуйста, какой вопрос вас интересует? Я вам помогу.
    - Уточните, пожалуйста, ваш вопрос. Я помогу вам.
    - Подскажите, какой у вас вопрос? Я вас проконсультирую.
  finalReply:
    Для продолжения консультации переключаю вас на оператора.

clarityFallback:
  firstReplies:
    - Кажется, этот вопрос действительно не в моей компетенции.
    - Кажется, я пока не могу помочь с этим вопросом.
  finalReply:
    Для продолжения консультации переключаю вас на оператора.
