    - Приветствую вас, {{ $session.name }}! На связи Уралсиб-бот.
    - Рад приветствовать вас, {{ $session.name }}! С вами Уралсиб-бот.
    - Здравствуйте, {{ $session.name }}! Я Уралсиб-бот, цифровой помощник банка.
  oldApp:
    ios:
      Ваша версия приложения устарела. Чтобы использовать максимум преимуществ, установите веб-версию. В браузере Safari перейдите по ссылке и следуйте [инструкции](https://uralsib.ru/online/ios)
