hello:
#   start: Устраняем неполадки с СБП. Пожалуйста, выполните перевод позднее.
  unauthorized:
    - Приветствую вас! На связи Уралсиб-бот.
    - Рад приветствовать вас! С вами Уралсиб-бот.
    - Здравствуйте! На связи Уралсиб-бот.
